: resifler sanılandan daha dirençli. B: ısıya dayanıklı genetik varyantlar → dayanıklılık kanıtı.",rule:"Kanıt: 'heat-resistant genetic variants' → dirençlilik",difficulty:"orta"},{id:7037,topicId:21,passage:"An economist argues that automation will not lead to mass unemployment because new technologies historically create more jobs than they eliminate.\n\nWhich finding, if true, would most directly weaken this argument?",options:["A) The introduction of ATMs in the 1980s ultimately led to an increase in bank employment.","B) A longitudinal study found that, unlike previous technological revolutions, AI automation is displacing workers across multiple skill levels simultaneously, outpacing the economy's ability to generate replacement occupations.","C) Some economists agree that automation will create new job categories.","D) The unemployment rate in the United States has fluctuated over the past century."],answer:"B",explanation:"İddia: tarihsel olarak teknoloji iş yaratır. B: bu sefer farklı — birden fazla beceri seviyesinde eşzamanlı yerinden etme. Tarihsel paterni bozuyor → zayıflatır.",rule:"Zayıflatma: 'unlike previous...outpacing' → bu sefer farklı",difficulty:"zor"},{id:7038,topicId:21,passage:"A cultural anthropologist claims that globalization has not led to cultural homogenization but rather to 'glocalization' — a process in which global cultural products are adapted and transformed by local communities.\n\nWhich finding, if true, would most directly support this claim?",options:["A) American fast-food chains have expanded to over 100 countries.","B) In Japan, McDonald's menus feature items like the Teriyaki McBurger and green tea milkshakes that reflect distinctly Japanese culinary preferences, while in India, the chain offers a largely vegetarian menu adapted to local dietary practices.","C) The number of international tourist arrivals has increased steadily since 1990.","D) Hollywood films generate the majority of their revenue from international markets."],answer:"B",explanation:"İddia: küresel ürünler yerel olarak dönüştürülüyor. B: McDonald's'ın Japonya ve Hindistan'daki yerel adaptasyonları → glokalleşme kanıtı.",rule:"Kanıt: aynı marka + farklı yerel adaptasyonlar → glokalleşme",difficulty:"orta"},{id:7039,topicId:21,passage:"A neuroscientist hypothesizes that chronic stress physically alters the structure of the brain.\n\nWhich finding, if true, would most directly support this hypothesis?",options:["A) People who report high stress levels also tend to report lower life satisfaction.","B) Brain imaging studies reveal that individuals who experienced chronic stress over a five-year period showed measurable reductions in hippocampal volume compared to a control group.","C) Stress management techniques such as meditation have become increasingly popular.","D) The pharmaceutical industry has developed several medications to treat anxiety."],answer:"B",explanation:"Hipotez: kronik stres beyin yapısını fiziksel olarak değiştiriyor. B: beyin görüntüleme + hipokampüs hacminde ölçülebilir azalma → fiziksel değişiklik kanıtı.",rule:"Kanıt: beyin görüntüleme + yapısal değişiklik → fiziksel etki",difficulty:"orta"},{id:7040,topicId:22,passage:"A researcher tracked employee productivity at a company before and after it implemented a four-day workweek.\n\n- 5-day workweek: 78 tasks completed per employee per month\n- 4-day workweek: 82 tasks completed per employee per month\n- Employee satisfaction: increased from 64% to 89%\n- Sick days: decreased from 4.2 to 1.8 per quarter\n\nWhich choice most effectively uses data from the study to argue that the four-day workweek benefited both employees and the company?",options:["A) Employee satisfaction increased from 64% to 89% under the four-day workweek.","B) Employees completed 82 tasks per month under the four-day workweek, compared to 78 under the five-day schedule, while satisfaction rose from 64% to 89% and sick days fell from 4.2 to 1.8 per quarter — suggesting that the shorter week benefited both productivity and employee wellbeing.","C) The company implemented a four-day workweek and tracked several metrics.","D) Sick days decreased from 4.2 to 1.8 per quarter under the new schedule."],answer:"B",explanation:"İddia: hem çalışanlar HEM şirket yararlandı. B: verimlilik arttı (şirket) + memnuniyet arttı + hastalık azaldı (çalışan) = her ikisi.",rule:"Çift fayda: verimlilik + memnuniyet + hastalık azalması",difficulty:"orta"},{id:7041,topicId:22,passage:"A city tracked air quality measurements before and after expanding its bicycle infrastructure.\n\n- 2018 (before expansion): Average PM2.5: 18.4 μg/m³, Bicycle commuters: 3.2%\n- 2023 (after expansion): Average PM2.5: 14.1 μg/m³, Bicycle commuters: 11.7%\n- Car traffic volume: decreased by 9%\n\nWhich choice most effectively uses data to support the claim that expanding bicycle infrastructure can improve urban air quality?",options:["A) The percentage of bicycle commuters increased from 3.2% to 11.7% between 2018 and 2023.","B) After the city expanded its bicycle infrastructure, bicycle commuting rose from 3.2% to 11.7%, car traffic decreased by 9%, and average PM2.5 levels fell from 18.4 to 14.1 μg/m³ — a 23% improvement in air quality.","C) PM2.5 levels in 2023 were 14.1 μg/m³, which is below the WHO guideline of 15 μg/m³.","D) Car traffic volume decreased by 9% between 2018 and 2023."],answer:"B",explanation:"İddia: bisiklet altyapısı → hava kalitesi iyileşmesi. B: bisiklet artışı → araba azalması → PM2.5 düşüşü = tüm zinciri gösteriyor.",rule:"Nedensellik zinciri: bisiklet↑ → araba↓ → hava kalitesi↑",difficulty:"zor"},{id:7042,topicId:22,passage:"A study measured the relationship between daily screen time and sleep quality in teenagers.\n\n- 0-1 hours: 8.2 hours average sleep, 82% reported 'good' sleep quality\n- 2-3 hours: 7.4 hours average sleep, 68% reported 'good' quality\n- 4-5 hours: 6.8 hours average sleep, 41% reported 'good' quality\n- 6+ hours: 5.9 hours average sleep, 23% reported 'good' quality\n\nWhich choice most effectively uses data to support the claim that excessive screen time is associated with significantly worse sleep outcomes in teenagers?",options:["A) Teenagers who spent 6+ hours on screens averaged only 5.9 hours of sleep, compared to 8.2 hours for those with 0-1 hours of screen time — a difference of 2.3 hours — and only 23% of heavy screen users reported good sleep quality versus 82% of light users.","B) All groups of teenagers reported some level of poor sleep quality.","C) Teenagers with 2-3 hours of screen time averaged 7.4 hours of sleep per night.","D) Sleep quality decreased as screen time increased across all groups in the study."],answer:"A",explanation:"İddia: aşırı ekran süresi → belirgin şekilde daha kötü uyku. A: en düşük vs en yüksek grubun spesifik karşılaştırması = en güçlü kanıt.",rule:"Uç grupların karşılaştırması: 5.9 vs 8.2 saat + 23% vs 82%",difficulty:"orta"},{id:7043,topicId:23,passage:"The following text discusses a finding in evolutionary biology.\n\n\"Researchers studying octopus DNA found that octopuses possess a surprisingly large number of protocadherin genes — genes associated with neural development in vertebrates. While vertebrates and octopuses diverged from a common ancestor over 500 million years ago and their complex nervous systems evolved independently, the presence of similar genetic building blocks in both lineages suggests\"\n\nWhich choice most logically completes the text?",options:["A) that octopuses are more closely related to vertebrates than previously believed.","B) that complex nervous systems may not have arisen by chance but may be constrained by a limited set of molecular pathways.","C) that octopuses are less intelligent than vertebrates.","D) that protocadherin genes serve no function in octopuses."],answer:"B",explanation:"Bağımsız evrim + benzer genetik yapı taşları → kompleks sinir sistemleri rastgele değil, sınırlı moleküler yollarla kısıtlanmış olabilir. B.",rule:"Çıkarım: bağımsız evrim + benzer genler → kısıtlı yollar",difficulty:"zor"},{id:7044,topicId:23,passage:"The following text is from a 2024 economics article.\n\n\"Economists have long debated whether immigration depresses wages for native-born workers. A comprehensive analysis of labor markets in 15 countries over three decades found no statistically significant negative effect on wages for native-born workers in any skill category. The study did find, however, that immigration modestly increased wages in sectors experiencing labor shortages, likely because immigrant workers filled positions that native-born workers were unwilling to accept.\"\n\nBased on the text, which choice best states an inference about the relationship between immigration and wages?",options:["A) Immigration invariably leads to higher wages for all workers.","B) The commonly held concern that immigration depresses native-born workers' wages may be unfounded, and in some cases immigration may actually support wage growth.","C) Immigration has no effect on the economy whatsoever.","D) The study conclusively proves that immigration benefits all workers equally."],answer:"B",explanation:"Negatif etki bulunamadı + bazı sektörlerde mütevazı artış. B nüanslı çıkarım (may/some). A/D çok kesin, C çok geniş.",rule:"Çıkarım: negatif etki yok + bazı sektörlerde artış → nüanslı sonuç",difficulty:"zor"},{id:7045,topicId:23,passage:"The following text discusses a 2023 study on education.\n\n\"A randomized controlled trial in 200 elementary schools tested whether teaching students metacognitive strategies — techniques for monitoring and regulating their own thinking processes — would improve academic performance. Students in the treatment group received twelve hours of metacognitive training over a semester. At the end of the year, treatment students outperformed control students by an average of 0.4 standard deviations on standardized math and reading assessments. Notably, the effect was largest among students who had been performing in the bottom quartile before the intervention.\"\n\nBased on the text, which choice best states an inference about the practical implications of these findings?",options:["A) Metacognitive training is effective only for low-performing students.","B) Twelve hours of training is the optimal amount of metacognitive instruction.","C) Teaching students how to think about their own thinking could be a cost-effective way to improve academic outcomes, particularly for struggling students.","D) Standardized tests are the best measure of student learning."],answer:"C",explanation:"12 saat eğitim + 0.4 SD iyileşme + en çok düşük performanslılarda = düşük maliyet, yüksek etki, özellikle zayıf öğrenciler için. C.",rule:"Pratik çıkarım: düşük maliyet + yüksek etki + en çok fayda = düşük performanslılar",difficulty:"orta"},{id:7046,topicId:23,passage:"The following text is from a sociology article.\n\n\"Researchers studying neighborhood effects on health found that residents of high-poverty neighborhoods had significantly worse health outcomes than residents of low-poverty neighborhoods, even after controlling for individual income, education, and health behaviors. This suggests that there are features of neighborhood environments — such as exposure to pollution, limited access to healthy food, and chronic psychosocial stress — that independently affect health beyond the influence of individual-level factors.\"\n\nWhich choice most logically follows from the passage?",options:["A) Individual income has no effect on health outcomes.","B) Policies aimed solely at improving individual health behaviors, without addressing the environmental conditions of high-poverty neighborhoods, may be insufficient to close health disparities.","C) All residents of high-poverty neighborhoods have poor health.","D) Pollution is the primary cause of health disparities between neighborhoods."],answer:"B",explanation:"Bireysel faktörler kontrol edildikten SONRA bile mahalle etkisi var → sadece bireysel davranışlara odaklanan politikalar yetersiz olabilir. B.",rule:"Çıkarım: bireysel kontrol sonrası hâlâ mahalle etkisi → çevresel politikalar gerekli",difficulty:"zor"}];const TOPICS_META=[{"id":1,"emoji":"🚧","color":"#ff6b6b","bg":"#1a0505","title":"Cümle Sınırları","sub":"Nokta · Noktalı Virgül · FANBOYS","hack":"DUR işaretleri: (.) = (;) = (, + FANBOYS). Her iki taraf da TAM CÜMLE. Sadece virgül = Comma Splice = YANLIŞ."},{"id":2,"emoji":"💥","color":"#ffa657","bg":"#1a0f00","title":"İki Nokta ve Tire","sub":"( : ) ve ( — ) Kuralları","hack":"İki nokta = 'yani'. Solda TAM CÜMLE zorunlu. 'such as/including/like' sonrası ASLA iki nokta. Çift tire: Ortayı sil → cümle tam mı?"},{"id":3,"emoji":"✂️","color":"#3fb950","bg":"#030d05","title":"Virgül Kuralları","sub":"Which/That · Appositive · Kaçak Virgüller","hack":"WHICH = virgülle | THAT = virgülsüz. Silme testi: İki virgül arasını sil, cümle anlamlı mı? Özne-Fiil arası virgül = HER ZAMAN YANLIŞ."},{"id":4,"emoji":"👑","color":"#ff79c6","bg":"#1a0010","title":"Apostrof","sub":"Sahiplik · Kısaltmalar · Kritik 4'lü","hack":"Kopyala-Yapıştır Testi: Apostroflu kelimeyi aç, cümleye koy, mantıklı mı? its = sahiplik | it's = it is. their = onların | they're = they are"},{"id":5,"emoji":"⚡","color":"#58a6ff","bg":"#010d1a","title":"Özne-Fiil Uyumu","sub":"Tekil/Çoğul · Gürültü Silme","hack":"Gürültüleri sil: 'of the..., along with...' → Gerçek özneyi bul. Each/Every = TEKİL. 'The number of' = TEKİL. 'A number of' = ÇOĞUL."},{"id":6,"emoji":"🎭","color":"#bd93f9","bg":"#0d0015","title":"Zamir Uyumu ve Durumu","sub":"Who/Whom · I/Me · Belirsiz Atıf","hack":"WHO/WHOM testi: He/she → WHO | Him/her → WHOM. Edat sonrası (to/for/between...) → nesne zamiri. Belirsiz zamir = her zaman yanlış."},{"id":7,"emoji":"🎯","color":"#ffa500","bg":"#1a0e00","title":"Modifier Kazaları","sub":"Dangling & Misplaced Modifier","hack":"'O Adam' Kuralı: Virgülden HEMEN SONRA eylemi yapan kişi/şey gelir. Eylemi yapan belirsizse = Dangling Modifier."},{"id":8,"emoji":"🔄","color":"#50fa7b","bg":"#001a05","title":"Fiil Zamanı ve Paralel Yapı","sub":"Tense · Paralel Liste","hack":"Paralel: Liste öğeleri AYNI FORMDA. İlk öğenin formunu al, diğerlerini kontrol et. 'By the time + past' → Past Perfect."},{"id":9,"emoji":"🔀","color":"#ff5555","bg":"#1a0002","title":"Karıştırılan Kelimeler","sub":"affect/effect · fewer/less · then/than","hack":"RAVEN: Affect=Verb, Effect=Noun. Fewer = sayılabilir. Less = sayılamaz. Then = zaman. Than = karşılaştırma."},{"id":10,"emoji":"🔍","color":"#64ffda","bg":"#001a16","title":"Sıfat vs Zarf","sub":"Adjective/Adverb · Duygu Fiilleri","hack":"Fiil niteleyen → ZARF (-ly). İsim niteleyen → SIFAT. feel/look/seem/smell/taste/sound/become/remain/grow sonrası → SIFAT."},{"id":11,"emoji":"⚖️","color":"#bd93f9","bg":"#0d0018","title":"Karşılaştırma Yapıları","sub":"Logical Comparison · that of / those of","hack":"Elma-elmayla! 'that of' = tekil, 'those of' = çoğul. Kendini karşılaştırmaya dahil etme → 'any OTHER' / 'anyone else'."},{"id":12,"emoji":"🌀","color":"#e3b341","bg":"#1a1200","title":"Subjunctive Mood","sub":"if...were · recommend that + base form","hack":"Gerçek olmayan IF: WERE (was değil, tüm özneler). Zorunluluk fiilleri: recommend/suggest/require/demand that → BASE FORM (s yok, 'be' kullan 'is' yerine)."},{"id":13,"emoji":"🔗","color":"#ffa500","bg":"#1a0e00","title":"Bağlaç Zarfları","sub":"however · therefore · moreover","hack":"; however, | . However, → Her ikisi de doğru. Sadece virgülle iki tam cümleyi birleştiremez (Comma Splice!). however/therefore/moreover bağlaç DEĞİL, ZARF."},{"id":14,"emoji":"🗑️","color":"#50fa7b","bg":"#001a05","title":"Gereksiz Kelime / Kısalık","sub":"Conciseness · Anlam Tekrarı","hack":"SAT her zaman KISAYI tercih eder. Anlam aynıysa → Kısayı seç. 'return back' = yanlış. 'due to the fact that' → 'because'. DELETE seçeneği varsa ve anlam korunuyorsa → genellikle doğrudur."},{"id":15,"emoji":"🔀","color":"#61afef","bg":"#0a1628","title":"Transitions (EOI)","sub":"however · therefore · similarly · for example","hack":"Cümlelerin ilişkisini belirle: Zıtlık? Sebep-sonuç? Ek bilgi? Örnek? Benzerlik? Doğru geçiş kelimesini seç. TUZAK: 'For example' zaten bir örnek varken gelmez!"},{"id":16,"emoji":"🧩","color":"#c678dd","bg":"#180028","title":"Rhetorical Synthesis (EOI)","sub":"Not Sentezi · Hedef Odaklı Yazım","hack":"ÖNCELİK: Hedefi (goal) oku → notlardan ilgili bilgileri seç → hedefle tam eşleşen cümleyi bul. En uzun/detaylı şık HER ZAMAN doğru değildir!"},{"id":17,"emoji":"📖","color":"#e06c75","bg":"#1a0508","title":"Vocabulary in Context","sub":"Kelime Anlamı · Bağlamdan Çıkarım","hack":"Boşluğu kapatıp cümleyi oku → bağlam ipuçlarını bul (contrast: although/but, definition: ';' sonrası açıklama, cause: sonuç cümlesi). Kendi kelimeni uydur, sonra şıklarla eşleştir."},{"id":18,"emoji":"🏗️","color":"#98c379","bg":"#0a1a05","title":"Text Structure & Purpose","sub":"Metin Yapısı · Yazarın Amacı","hack":"Metnin ne YAPTIĞINI sor: Bir görüş sunup çürütüyor mu? Bulgu + belirsizlik mi? Zaman sırası mı? İlk cümle genellikle yönü gösterir. 'However/but' = yapıda dönüş noktası."},{"id":19,"emoji":"🔗","color":"#56b6c2","bg":"#051a1c","title":"Cross-Text Connections","sub":"Çift Metin · Perspektif Karşılaştırma","hack":"Her metnin ANA İDDİASINI belirle → İlişkiyi bul: Katılıyor mu? Kısmen katılıp ekliyor mu? Karşı çıkıyor mu? Alternatif açıklama mı sunuyor? Nüanslı cevaplar genellikle doğrudur."},{"id":20,"emoji":"💡","color":"#d19a66","bg":"#1a0f05","title":"Central Ideas & Details","sub":"Ana Fikir · Destekleyici Detaylar","hack":"Ana fikir = metnin BİR BÜTÜN OLARAK ne söylediği. Detay soruları = spesifik bilgi. Ana fikir şıkkı tüm metni kapsamalı — sadece bir cümleyi değil. ÇOK DAR veya ÇOK GENİŞ şıkları ele."},{"id":21,"emoji":"📋","color":"#c678dd","bg":"#140020","title":"Command of Evidence (Textual)","sub":"Metin Kanıtı · İddia Destekleme","hack":"İddiayı oku → Hangi bulgu bunu DOĞRUDAN destekler/zayıflatır? İlgisiz verileri ele. 'Destekler' = neden-sonuç bağı kurar. 'Zayıflatır' = alternatif açıklama sunar."},{"id":22,"emoji":"📊","color":"#61afef","bg":"#050f1a","title":"Command of Evidence (Quantitative)","sub":"Grafik/Tablo Kanıtı · Veri Yorumlama","hack":"İddiayı oku → Tablodaki HANGİ spesifik veriler iddiayı destekler? Sadece veri gösteren şıkkı değil, veriyi iddiaya BAĞLAYAN şıkkı seç. Karşılaştırma içeren şıklar genellikle daha güçlü."},{"id":23,"emoji":"🧠","color":"#e5c07b","bg":"#1a1505","title":"Inferences & Conclusions","sub":"Çıkarım · Mantıksal Sonuç","hack":"Metne YAKIN kal — aşırı yorumlama yapma. 'Suggests/implies' = kanıtla desteklenen sonuç. ASLA 'proves/definitely' → SAT kesin dil kullanmaz. 'Some/may/partially' → SAT'ın tercih ettiği nüanslı dil."}];function fisherYates(arr){const a=[...arr];for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}const MASTER_RULES=[{signal:"Noktalama değişiyor (. ; , :)",topic:"Cümle Sınırları / İki Nokta",bolum:"1-2"},{signal:"Virgül var/yok",topic:"Virgül Kuralları",bolum:"3"},{signal:"Apostrof değişiyor ('s / s' / s)",topic:"Apostrof",bolum:"4"},{signal:"Fiil değişiyor (is/are, has/have)",topic:"Özne-Fiil Uyumu",bolum:"5"},{signal:"Zamir değişiyor (he/they, who/whom)",topic:"Zamir",bolum:"6"},{signal:"Cümle başı değişiyor (Having... / To...)",topic:"Modifier",bolum:"7"},{signal:"Fiil zamanı değişiyor",topic:"Fiil Zamanı",bolum:"8"},{signal:"Liste öğeleri değişiyor",topic:"Paralel Yapı",bolum:"8"},{signal:"affect/effect, fewer/less, then/than",topic:"Karıştırılan Kelimeler",bolum:"9"},{signal:"Sıfat mı / Zarf mı? (-ly var/yok)",topic:"Sıfat vs Zarf",bolum:"10"},{signal:"'that of' / 'those of' eksik",topic:"Karşılaştırma Yapıları",bolum:"11"},{signal:"'if...were' veya 'that + fiil'",topic:"Subjunctive",bolum:"12"},{signal:"; however, / . However, formatı",topic:"Bağlaç Zarfları",bolum:"13"},{signal:"İki şık aynı anlam, biri daha kısa",topic:"Gereksiz Kelime / Kısalık",bolum:"14"},{signal:"Boşlukta geçiş kelimesi (However, Therefore, Similarly...)",topic:"Transitions (EOI)",bolum:"15"},{signal:"Bullet point notları + 'Which choice most effectively...'",topic:"Rhetorical Synthesis (EOI)",bolum:"16"},{signal:"Boşlukta kelime, bağlamdan anlam çıkar",topic:"Vocabulary in Context",bolum:"17"},{signal:"'Which best describes the structure/purpose...'",topic:"Text Structure & Purpose",bolum:"18"},{signal:"İki metin (Text 1 / Text 2) + karşılaştırma",topic:"Cross-Text Connections",bolum:"19"},{signal:"'Which best states the main idea...'",topic:"Central Ideas & Details",bolum:"20"},{signal:"'Which finding supports/weakens the claim...'",topic:"Command of Evidence (Textual)",bolum:"21"},{signal:"Tablo/grafik verisi + iddia bağlama",topic:"Command of Evidence (Quantitative)",bolum:"22"},{signal:"'Which most logically completes...' veya inference",topic:"Inferences & Conclusions",bolum:"23"}];const ALWAYS_WRONG=["Özne ile fiil arasına virgül girmesi","Noktalı virgül + FANBOYS bir arada (; and → YANLIŞ)","'however' / 'therefore' tek başına iki cümleyi birleştiremez","Sadece virgülle iki tam cümleyi birleştirmek (Comma Splice)","'that' ile birlikte virgül kullanmak","Sahiplik için 'it's' yazmak (doğrusu: its)","Modifier'dan sonra yanlış özne gelmesi","Sol tarafta tam cümle yokken iki nokta ( : ) kullanmak","Karşılaştırmada farklı tür şeyleri karşılaştırmak","'was' yazmak gerçek olmayan koşulda (doğrusu: 'were')","Zaten bir örnek varken 'For example' ile ikinci benzer örnek vermek (doğrusu: Similarly)","Rhetorical Synthesis'te hedefe uymayan ama doğru bilgi içeren şıkkı seçmek","Vocabulary: Kelimeyi cümleden bağımsız bilinen anlamıyla seçmek (bağlam her zaman belirler)","Inference: 'Proves/definitely/always' gibi mutlak dil içeren şıkları seçmek (SAT nüanslı dil tercih eder)","Main Idea: Sadece bir detayı kapsayan dar şıkkı ana fikir olarak seçmek","Evidence: Doğru ama iddiaya ALAKASIZ veri içeren şıkkı kanıt olarak seçmek"];const ALWAYS_RIGHT=["Nokta (.) ve Noktalı virgül (;) tamamen değiştirilebilir","'which' HER ZAMAN virgülle gelir | 'that' HİÇBİR ZAMAN virgülle gelmez","'Each', 'Every', 'Either', 'Neither' TEKİL fiil alır","Bağlaç zarfından önce ; veya . , sonra , gerekir: ; however,","Fiili niteleyen şey → ZARF (-ly) | İsmi niteleyen → SIFAT","Karşılaştırmada aynı tür şeyleri karşılaştır → 'that of / those of'","Subjunctive: if...were / recommend that + base form","SAT her zaman KISAYI tercih eder — anlam korunuyorsa","Transition: İki cümle arasındaki mantıksal ilişkiyi belirle → uygun geçişi seç","Rhetorical Synthesis: Hedefi (goal) önce oku, notları tara, hedefle en uyumlu sentezi seç","800 STRATEJİ: Şıkları eleme — önce kesinlikle yanlış 2 şıkkı ele, kalan 2'den seç","800 STRATEJİ: Soru başına ortalama 70 saniye — bilmiyorsan işaretle ve geç, sonra dön","800 STRATEJİ: SEC sorularında en KISA doğru cevap genellikle doğrudur","800 STRATEJİ: 'No change needed' şıkkı varsa ve hata bulamıyorsan — muhtemelen doğru","800 STRATEJİ: Inference sorularında 'may/suggests/some' içeren nüanslı şıklar → genellikle doğru","800 STRATEJİ: Cross-text sorularında tam karşıtlık nadirdir — 'kısmen katılır ama...' kalıbını ara","Vocabulary: Bağlam ipuçlarını bul (contrast/definition/cause) → kendi kelimeni uydur → şıklarla eşleştir","Text Structure: 'However/but/yet' = yapıda dönüş noktası → 'geleneksel görüş + karmaşıklaştırma'","Cross-Text: Nüanslı cevaplar doğrudur — 'kısmen katılır ama...' > 'tamamen reddeder'","Inference: SAT nüanslı dil sever → 'may/suggests/some' içeren şıklar genellikle doğru"];const GUIDE_RULES={1:{rules:[{form:"FANBOYS",exp:"for, and, nor, but, or, yet, so",note:"7 kelimeyi ezberle!"},{form:"Comma Splice",exp:"İki tam cümleyi SADECE virgülle birleştirme",note:"Her zaman yanlış"},{form:"Fragment",exp:"Tek başına anlamlı olmayan yarım cümle",note:"'Although...' → virgül + ana cümle"},{form:"Run-on",exp:"Hiç işaret olmadan iki cümleyi birleştirme",note:"Nokta veya noktalı virgül ekle"}],examples:[{wrong:"The storm hit, the town flooded.",right:"The storm hit; the town flooded.",label:"Comma Splice"},{wrong:"Although she studied hard.",right:"Although she studied hard, she passed.",label:"Fragment"},{wrong:"She studied hard she passed.",right:"She studied hard; she passed.",label:"Run-on"}]},2:{rules:[{form:":",exp:"Solda TAM CÜMLE + Sağda açıklama/liste",note:"'such as/including' sonrası ASLA"},{form:"—",exp:"Tek tire = iki nokta gibi. Çift tire = parantez gibi.",note:"Tire + virgül BİR ARADA olmaz"},{form:"'Yani' Testi",exp:"İki noktayı 'yani' ile değiştir, mantıklı mı?",note:"Evet → kullan | Hayır → kullanma"}],examples:[{wrong:"The menu included: soup, salad.",right:"The menu included soup and salad.",label:"included sonrası iki nokta"},{wrong:"She had one goal to win.",right:"She had one goal: to win.",label:"İki nokta eksik"},{wrong:"Items such as: apples.",right:"Items such as apples.",label:"such as sonrası iki nokta"}]},3:{rules:[{form:"WHICH",exp:"Virgülle — ek bilgi (silinebilir)",note:"Silme testi: Sil, anlamlı mı? Evet → which"},{form:"THAT",exp:"Virgülsüz — zorunlu bilgi",note:"Silme testi: Sil, anlamlı mı? Hayır → that"},{form:"Appositive",exp:"İsmi yeniden açıklayan öge → ÇİFT VİRGÜL",note:"Marcus, a philosopher, wrote..."},{form:"Kaçak Virgül",exp:"Özne-Fiil arası VİRGÜL ASLA",note:"The dog, barked. = YANLIŞ"}],examples:[{wrong:"The book which I read was good.",right:"The book, which I read, was good.",label:"which virgülsüz"},{wrong:"The dog, barked loudly.",right:"The dog barked loudly.",label:"Kaçak Virgül"},{wrong:"She likes cats, that purr.",right:"She likes cats that purr.",label:"that virgülle"}]},4:{rules:[{form:"'s",exp:"Tekil sahiplik: the dog's bone",note:"1 köpeğin kemiği"},{form:"s'",exp:"Çoğul sahiplik: the dogs' bone",note:"2+ köpeğin kemiği"},{form:"its / it's",exp:"its = sahiplik | it's = it is",note:"Kopyala-Yapıştır: 'it is' mantıklı mı?"},{form:"their / they're",exp:"their = onların | they're = they are",note:"there = orada (farklı!)"},{form:"whose / who's",exp:"whose = kimin | who's = who is",note:"your / you're de aynı mantık"}],examples:[{wrong:"The dog wagged it's tail.",right:"The dog wagged its tail.",label:"it's vs its"},{wrong:"They're going to there house.",right:"They're going to their house.",label:"there vs their"},{wrong:"Who's book is this?",right:"Whose book is this?",label:"who's vs whose"}]},5:{rules:[{form:"Gürültü Silme",exp:"'of the..., along with...' = gürültü",note:"The list of items IS long"},{form:"Each/Every",exp:"Her zaman TEKİL fiil",note:"Each student IS required..."},{form:"The number of",exp:"TEKİL",note:"The number of students IS..."},{form:"A number of",exp:"ÇOĞUL (= birçok)",note:"A number of students ARE..."},{form:"Neither...nor",exp:"En yakın özneye uy",note:"Neither A nor B → Fiil B'ye uyar"}],examples:[{wrong:"Each of them have arrived.",right:"Each of them has arrived.",label:"Each = tekil"},{wrong:"The number of cars are increasing.",right:"The number of cars is increasing.",label:"The number = tekil"},{wrong:"Neither she nor they was ready.",right:"Neither she nor they were ready.",label:"En yakın özne"}]},6:{rules:[{form:"WHO",exp:"He/she koyabiliyorsan → WHO",note:"The man who I admire → who (he)"},{form:"WHOM",exp:"Him/her koyabiliyorsan → WHOM",note:"The man whom I met → whom (him)"},{form:"I vs Me",exp:"Edat sonrası NESNE: Between you and ME",note:"'Between you and I' = YANLIŞ"},{form:"Belirsiz Atıf",exp:"'She told her she won' → Kim kazandı? = BELİRSİZ",note:"Zamiri isme çevir"}],examples:[{wrong:"Between you and I, this is wrong.",right:"Between you and me, this is wrong.",label:"Edat sonrası nesne"},{wrong:"The teacher who I respect retired.",right:"The teacher whom I respect retired.",label:"WHO vs WHOM"},{wrong:"When Sara met Lily, she was happy.",right:"When Sara met Lily, Sara was happy.",label:"Belirsiz Atıf"}]},7:{rules:[{form:"Dangling Modifier",exp:"Virgülden sonra yanlış özne gelir",note:"'Running, the bus left.' → Otobüs mu koştu?"},{form:"3 Adım",exp:"-ing/-ed + virgül → Kim yapıyor? → O kişi hemen sonra mı?",note:"Hepsi evet → DOĞRU"},{form:"Misplaced Modifier",exp:"Yanlış yerde, farklı anlam üretir",note:"'She only ate fish.' vs 'Only she ate fish.'"}],examples:[{wrong:"Having finished dinner, the dishes were washed.",right:"Having finished dinner, she washed the dishes.",label:"Dangling Modifier"},{wrong:"Running to catch the bus, her bag was left.",right:"Running to catch the bus, she left her bag.",label:"Dangling Modifier"},{wrong:"Exhausted, the runner fell asleep.",right:"✓ DOĞRU — koşucu yorgundu",label:"Doğru kullanım"}]},8:{rules:[{form:"Paralel Liste",exp:"Listedeki tüm ögeler AYNI FORMDA",note:"not only...but also da paralel zorunlu"},{form:"Zaman Tutarlılığı",exp:"Paragraf hangi zamandaysa onu kullan",note:"'was founded and grows' = tutarsız"},{form:"Past Perfect",exp:"had + V3 → Geçmişte başka eylemden ÖNCE oldu",note:"By the time he arrived, she had left."},{form:"both...and",exp:"İki taraf AYNI FORMDA",note:"both smart and hardworking = OK"}],examples:[{wrong:"She likes to run, swimming, and cycle.",right:"She likes to run, to swim, and to cycle.",label:"Paralel Liste"},{wrong:"He studied hard; he is passing now.",right:"He studied hard and passed.",label:"Zaman Tutarsızlığı"},{wrong:"By the time she left, he arrived.",right:"By the time she left, he had arrived.",label:"Past Perfect"}]},9:{rules:[{form:"affect/effect",exp:"RAVEN: Affect=Verb | Effect=Noun",note:"'a/an/the' var → isim → effect"},{form:"fewer/less",exp:"fewer = sayılabilir | less = sayılamaz",note:"fewer students, less water"},{form:"then/than",exp:"then = zaman | than = karşılaştırma",note:"First X, then Y | taller than Z"},{form:"amount/number",exp:"amount = sayılamaz | number = sayılabilir",note:"amount of water, number of cars"},{form:"between/among",exp:"between = 2 şey | among = 3+ şey",note:"between you and me / among the crowd"}],examples:[{wrong:"The music had a negative affect on her.",right:"The music had a negative effect on her.",label:"affect vs effect"},{wrong:"There are less students today.",right:"There are fewer students today.",label:"less vs fewer"},{wrong:"She is smarter then her brother.",right:"She is smarter than her brother.",label:"then vs than"}]},10:{rules:[{form:"SIFAT",exp:"İsmi niteler",note:"a CAREFUL driver / she is HAPPY"},{form:"ZARF",exp:"Fiili, zarfı, sıfatı niteler",note:"She drives CAREFULLY / VERY fast"},{form:"Duygu Fiilleri",exp:"feel/look/seem/smell/taste/sound → SIFAT",note:"She felt BAD (not badly)"},{form:"-ly kuralı",exp:"Çoğu zarf = sıfat + ly",note:"quick→quickly, careful→carefully"},{form:"İstisna",exp:"fast/hard/late/early = hem sıfat hem zarf",note:"He works hard (correct)"}],examples:[{wrong:"He ran quick to the store.",right:"He ran quickly to the store.",label:"Fiil → Zarf"},{wrong:"She felt badly after the news.",right:"She felt bad after the news.",label:"Duygu Fiili → Sıfat"},{wrong:"The test was surprising difficult.",right:"The test was surprisingly difficult.",label:"Zarf sıfatı niteler"}]},11:{rules:[{form:"that of",exp:"Tekil ismi tekrar etmemek için",note:"Turkey's population vs that of France"},{form:"those of",exp:"Çoğul ismi tekrar etmemek için",note:"Prices in NY vs those in London"},{form:"any OTHER",exp:"Kendini karşılaştırmaya dahil etme",note:"Smarter than any OTHER student"},{form:"as...as",exp:"İki tarafta da AYNI TÜR şeyler",note:"She runs as fast as her brother (OK)"}],examples:[{wrong:"Turkey's population is larger than France.",right:"Turkey's population is larger than that of France.",label:"that of eksik"},{wrong:"She is better than any player here.",right:"She is better than any OTHER player here.",label:"any OTHER eksik"},{wrong:"Prices in NY are higher than London.",right:"Prices in NY are higher than those in London.",label:"those of eksik"}]},12:{rules:[{form:"if...were",exp:"Gerçek olmayan koşul → WERE (tüm özneler)",note:"If I were you... / If he were here..."},{form:"recommend that",exp:"Öneri/zorunluluk + that → BASE FORM",note:"recommend that he BE present"},{form:"Base form",exp:"Fiil yalın hali: hiç ek yok, -s yok",note:"It is essential that she attend (not attends)"},{form:"Geçmiş varsayım",exp:"if + had + V3 → would have + V3",note:"If she had studied, she would have passed."}],examples:[{wrong:"If I was you, I'd reconsider.",right:"If I were you, I'd reconsider.",label:"if...were"},{wrong:"The law requires that he pays.",right:"The law requires that he pay.",label:"require that + base"},{wrong:"It is essential that she is here.",right:"It is essential that she be here.",label:"essential that + base"}]},13:{rules:[{form:"however",exp:"Zıtlık bağlaç zarfı",note:"TAM CÜMLE; however, TAM CÜMLE."},{form:"therefore",exp:"Sebep-sonuç bağlaç zarfı",note:"TAM CÜMLE; therefore, TAM CÜMLE."},{form:"moreover",exp:"Ek bilgi bağlaç zarfı",note:"TAM CÜMLE; moreover, TAM CÜMLE."},{form:"FORMAT",exp:"[; veya .] + [zarf] + [,]",note:"Her iki noktalama da lazım"},{form:"nevertheless",exp:"Zıtlık — 'buna rağmen'",note:"TAM CÜMLE; nevertheless, TAM CÜMLE."}],examples:[{wrong:"She failed, however she tried.",right:"She failed; however, she tried.",label:"Comma Splice"},{wrong:"The plan worked. Therefore it was approved.",right:"The plan worked. Therefore, it was approved.",label:"Virgül eksik"},{wrong:"She studied, however, she failed.",right:"She studied; however, she failed.",label:"Noktalı virgül lazım"}]},14:{rules:[{form:"Anlam Tekrarı",exp:"Aynı anlama gelen iki kelime bir arada",note:"unique + one-of-a-kind = REDUNDANT"},{form:"Gereksiz Uzatma",exp:"Çok kelimeyle söylenen kısa şeyler",note:"due to the fact that → because"},{form:"Zamir Tekrarı",exp:"İsim + aynı şeye atıf eden zamir",note:"The book, it was... → The book was..."},{form:"'return back'",exp:"'return' zaten geri demek → back fazla",note:"return / refer / revert = geri içeriyor"},{form:"Reason+Because",exp:"'The reason is because' = YANLIŞ",note:"'The reason is THAT' = DOĞRU"}],examples:[{wrong:"She is unique and one-of-a-kind.",right:"She is unique.",label:"Anlam Tekrarı"},{wrong:"Due to the fact that it rained, event cancelled.",right:"Because it rained, event was cancelled.",label:"Gereksiz Uzatma"},{wrong:"The policy, it will affect thousands.",right:"The policy will affect thousands.",label:"Zamir Tekrarı"}]},15:{rules:[{form:"Zıtlık",exp:"However, Nevertheless, On the other hand, Yet, By contrast",note:"İki cümle zıtsa → zıtlık geçişi"},{form:"Sebep-Sonuç",exp:"Therefore, Consequently, As a result, Thus, Accordingly",note:"A oldu → B sonucu"},{form:"Ek Bilgi",exp:"Furthermore, Moreover, In addition, Additionally",note:"Aynı yönde ek bilgi"},{form:"Örnek",exp:"For instance, For example, Specifically, To illustrate",note:"Genel ifade → spesifik örnek"},{form:"Benzerlik",exp:"Similarly, Likewise, In the same way",note:"Paralel durum/örnek"},{form:"Vurgu",exp:"Indeed, In fact, Notably",note:"Önceki ifadeyi güçlendirme"},{form:"Zaman Sırası",exp:"Subsequently, Next, Eventually, Meanwhile",note:"Kronolojik ilerleme"},{form:"TUZAK!",exp:"'For example' — zaten örnek varsa YANLIŞ",note:"İkinci benzer örnek = Similarly, NOT For example"}],examples:[{wrong:"She studied hard. For example, she passed.",right:"She studied hard. As a result, she passed.",label:"Sebep-sonuç"},{wrong:"NY is expensive. Similarly, it is crowded.",right:"NY is expensive. Moreover, it is crowded.",label:"Ek bilgi (aynı konu)"},{wrong:"One study found X. For example, another found Y.",right:"One study found X. Similarly, another found Y.",label:"İkinci benzer örnek"}]},16:{rules:[{form:"Hedefi Oku",exp:"Question'daki 'goal' cümlesini dikkatlice oku",note:"Her kelime önemli: 'emphasize' ≠ 'introduce'"},{form:"Notları Tara",exp:"Hedefle ilgili bullet point'ları belirle",note:"İlgisiz notları görmezden gel"},{form:"Sentez Et",exp:"Doğru şık ilgili notları hedefe uygun birleştirir",note:"Tüm notları kullanmak GEREKMEZ"},{form:"TUZAK: En Uzun",exp:"En detaylı/uzun şık her zaman doğru DEĞİL",note:"Hedefe uygunluk > detay miktarı"},{form:"TUZAK: Doğru Bilgi",exp:"Tüm şıklar doğru bilgi içerir!",note:"Mesele doğruluk değil, HEDEFe uygunluk"}],examples:[{wrong:"Hedef: 'emphasize decline' → Şık: pozitif çözüm anlatıyor",right:"Hedef: 'emphasize decline' → Şık: düşüş istatistiklerini veriyor",label:"Hedef uyumsuzluğu"},{wrong:"Hedef: 'compare A and B' → Şık: sadece A hakkında bilgi",right:"Hedef: 'compare A and B' → Şık: A ve B'yi karşılaştırıyor",label:"Eksik karşılaştırma"},{wrong:"Hedef: 'introduce to audience' → Şık: çok teknik detay",right:"Hedef: 'introduce' → Şık: genel tanıtım bilgileri",label:"Kitle uyumsuzluğu"}]},17:{rules:[{form:"Bağlam İpuçları",exp:"Contrast (although/but), Definition (;/—), Example, Cause-Effect",note:"İpucu türünü bul → anlam çıkar"},{form:"Kendi Kelimeni Uydur",exp:"Boşluğa kendi kelimeni koy, sonra şıklarla eşleştir",note:"Şıklara bakmadan önce tahmin et"},{form:"Olumlu/Olumsuz",exp:"Bağlam olumlu mu olumsuz mu? Yarısını hemen ele",note:"austere (+/-?) bağlama bağlı"},{form:"Derece Farkı",exp:"İki şık benzer ama biri daha güçlü/zayıf",note:"Bağlamın yoğunluğuna göre seç"}],examples:[{wrong:"Although she was shy → outgoing (zıt değil, bağlamla uyuşmuyor)",right:"Although she was shy → reserved (bağlamla uyumlu)",label:"Contrast ipucu"},{wrong:"His prose was spare → florid (süslü, zıt anlam)",right:"His prose was spare → austere (sade, uyumlu)",label:"Definition ipucu"}]},18:{rules:[{form:"Yapı Türleri",exp:"Görüş+Çürütme, Bulgu+Sınırlama, Giriş+Karmaşıklaştırma",note:"'However/but' = yapıda dönüş"},{form:"Amaç Türleri",exp:"Argue, Describe, Compare, Challenge, Explain",note:"Ne yapıyor? → Amaç"},{form:"Cümle Fonksiyonu",exp:"'İkinci cümle ne yapıyor?' → Destekliyor/Sınırlıyor/Örnekliyor",note:"Her cümlenin rolü var"}],examples:[{wrong:"Yapı: iki teori karşılaştırması (aslında biri sunulup çürütülüyor)",right:"Yapı: geleneksel görüş → yeni kanıtla karmaşıklaştırma",label:"Yapı belirleme"}]},19:{rul
