  <style>
    :root {
      --bg: #080b10;
      --bg2: #0d1117;
      --bg3: #161b22;
      --border: #21262d;
      --border2: #30363d;
      --text: #e6edf3;
      --muted: #8b949e;
      --accent: #00e5ff;
      --accent2: #7c3aed;
      --green: #3fb950;
      --red: #ff6b6b;
      --yellow: #ffa657;
      --blue: #58a6ff;
      --font-display: 'Syne', sans-serif;
      --font-mono: 'Space Mono', monospace;
      --font-body: 'Inter', sans-serif;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-body);
      -webkit-font-smoothing: antialiased;
    }
    #root { min-height: 100vh; }
    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }

    /* Auth screen */
    .auth-bg {
      min-height: 100vh;
      background: var(--bg);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      position: relative;
      overflow: hidden;
    }
    .auth-bg::before {
      content: '';
      position: absolute;
      top: -200px; left: -200px;
      width: 600px; height: 600px;
      background: radial-gradient(circle, #00e5ff08 0%, transparent 70%);
      pointer-events: none;
    }
    .auth-bg::after {
      content: '';
      position: absolute;
      bottom: -200px; right: -200px;
      width: 600px; height: 600px;
      background: radial-gradient(circle, #7c3aed08 0%, transparent 70%);
      pointer-events: none;
    }
    .auth-card {
      background: var(--bg3);
      border: 1px solid var(--border2);
      border-radius: 16px;
      padding: 40px 36px;
      width: 100%;
      max-width: 420px;
      position: relative;
      z-index: 1;
    }
    .auth-logo {
      font-family: var(--font-display);
      font-size: 32px;
      font-weight: 900;
      letter-spacing: -1px;
      margin-bottom: 6px;
    }
    .auth-logo span { color: var(--accent); }
    .auth-tagline {
      font-size: 13px;
      color: var(--muted);
      margin-bottom: 28px;
      font-family: var(--font-mono);
    }
    .auth-tab-row {
      display: flex;
      gap: 4px;
      background: var(--bg2);
      border-radius: 10px;
      padding: 4px;
      margin-bottom: 24px;
    }
    .auth-tab {
      flex: 1;
      padding: 9px;
      background: transparent;
      border: none;
      border-radius: 7px;
      color: var(--muted);
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      font-family: var(--font-body);
    }
    .auth-tab.active {
      background: var(--bg3);
      color: var(--text);
      box-shadow: 0 1px 4px rgba(0,0,0,0.4);
    }
    .auth-input {
      width: 100%;
      padding: 12px 14px;
      background: var(--bg2);
      border: 1px solid var(--border2);
      border-radius: 8px;
      color: var(--text);
      font-size: 14px;
      font-family: var(--font-body);
      margin-bottom: 12px;
      outline: none;
      transition: border-color 0.2s;
    }
    .auth-input:focus { border-color: var(--accent); }
    .auth-input::placeholder { color: var(--muted); }
    .auth-btn {
      width: 100%;
      padding: 13px;
      background: var(--accent);
      border: none;
      border-radius: 8px;
      color: #000;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s;
      font-family: var(--font-body);
      margin-bottom: 12px;
    }
    .auth-btn:hover { background: #00f5ff; transform: translateY(-1px); }
    .auth-btn:disabled { background: var(--border2); color: var(--muted); transform: none; cursor: not-allowed; }
    .auth-divider {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 16px 0;
      color: var(--muted);
      font-size: 12px;
    }
    .auth-divider::before, .auth-divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border2);
    }
    .google-btn {
      width: 100%;
      padding: 12px;
      background: var(--bg2);
      border: 1px solid var(--border2);
      border-radius: 8px;
      color: var(--text);
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      font-family: var(--font-body);
    }
    .google-btn:hover { border-color: var(--accent); background: var(--bg3); }
    .auth-error {
      background: #ff6b6b15;
      border: 1px solid #ff6b6b44;
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 13px;
      color: var(--red);
      margin-bottom: 12px;
    }

    /* Top nav */
    .nav {
      background: var(--bg3);
      border-bottom: 1px solid var(--border);
      padding: 0 20px;
      height: 56px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .nav-logo {
      font-family: var(--font-display);
      font-size: 22px;
      font-weight: 900;
      letter-spacing: -0.5px;
      cursor: pointer;
      user-select: none;
    }
    .nav-logo span { color: var(--accent); }
    .nav-right { display: flex; align-items: center; gap: 12px; }
    .nav-score {
      font-family: var(--font-mono);
      font-size: 12px;
      color: var(--blue);
    }
    .nav-avatar {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--accent2), var(--accent));
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 13px;
      font-weight: 700;
      color: #fff;
      cursor: pointer;
      position: relative;
    }
    .nav-menu {
      position: absolute;
      top: 44px;
      right: 0;
      background: var(--bg3);
      border: 1px solid var(--border2);
      border-radius: 10px;
      padding: 6px;
      min-width: 180px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.4);
    }
    .nav-menu-item {
      padding: 9px 14px;
      border-radius: 6px;
      font-size: 13px;
      cursor: pointer;
      color: var(--text);
      transition: background 0.15s;
    }
    .nav-menu-item:hover { background: var(--bg2); }
    .nav-menu-item.danger { color: var(--red); }
    .nav-menu-divider { height: 1px; background: var(--border2); margin: 4px 0; }

    /* Home */
    .home-hero {
      text-align: center;
      padding: 40px 20px 28px;
      max-width: 700px;
      margin: 0 auto;
    }
    .home-title {
      font-family: var(--font-display);
      font-size: clamp(28px, 6vw, 48px);
      font-weight: 900;
      letter-spacing: -1px;
      line-height: 1.1;
      margin-bottom: 12px;
    }
    .home-title span { color: var(--accent); }
    .home-subtitle {
      font-size: 15px;
      color: var(--muted);
      font-family: var(--font-mono);
    }

    /* Stat chips */
    .stat-row {
      display: flex;
      justify-content: center;
      gap: 8px;
      flex-wrap: wrap;
      margin: 16px 0 28px;
    }
    .stat-chip {
      padding: 6px 14px;
      background: var(--bg3);
      border: 1px solid var(--border2);
      border-radius: 20px;
      font-size: 12px;
      font-family: var(--font-mono);
      color: var(--muted);
    }
    .stat-chip b { color: var(--accent); }

    /* Action buttons */
    .action-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
      gap: 10px;
      max-width: 860px;
      margin: 0 auto 28px;
      padding: 0 16px;
    }
    .action-btn {
      padding: 14px 16px;
      border: 1px solid var(--border2);
      border-radius: 10px;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s;
      font-family: var(--font-body);
      text-align: center;
    }
    .action-btn:hover { transform: translateY(-2px); }
    .action-btn:disabled { opacity: 0.35; cursor: not-allowed; transform: none; }

    /* Topic grid */
    .topic-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(230px, 1fr));
      gap: 10px;
      max-width: 860px;
      margin: 0 auto;
      padding: 0 16px 80px;
    }
    .topic-card {
      border: 1px solid;
      border-radius: 10px;
      padding: 14px 16px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .topic-card:hover { transform: translateY(-2px); }

    /* Domain badge */
    .domain-badge {
      display: inline-block;
      padding: 3px 10px;
      border-radius: 12px;
      font-size: 10px;
      font-weight: 700;
      font-family: var(--font-mono);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 8px;
    }

    /* Progress bar */
    .prog-bar {
      height: 4px;
      background: var(--border);
      border-radius: 2px;
      margin-bottom: 20px;
    }
    .prog-fill {
      height: 100%;
      border-radius: 2px;
      background: var(--blue);
      transition: width 0.3s;
    }

    /* Quiz */
    .quiz-wrap {
      max-width: 720px;
      margin: 0 auto;
      padding: 20px 16px 80px;
    }
    .passage-card {
      background: var(--bg3);
      border: 1px solid var(--border2);
      border-radius: 12px;
      padding: 20px 24px;
      margin-bottom: 16px;
      font-size: 16px;
      line-height: 1.7;
      font-family: var(--font-body);
    }
    .option-btn {
      width: 100%;
      padding: 13px 16px;
      background: var(--bg3);
      border: 1px solid var(--border2);
      border-radius: 8px;
      color: var(--text);
      font-size: 14px;
      cursor: pointer;
      text-align: left;
      transition: all 0.15s;
      margin-bottom: 8px;
      font-family: var(--font-body);
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .option-btn:hover:not(:disabled) { border-color: var(--blue); background: #101828; }
    .option-btn:disabled { cursor: default; }
    .option-letter {
      font-family: var(--font-mono);
      font-size: 12px;
      font-weight: 700;
      min-width: 24px;
      height: 24px;
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--bg2);
    }
    .feedback-box {
      border-radius: 10px;
      padding: 14px 18px;
      margin-bottom: 12px;
      font-size: 13px;
      line-height: 1.6;
    }
    .next-btn {
      width: 100%;
      padding: 14px;
      background: var(--blue);
      border: none;
      border-radius: 8px;
      color: #fff;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s;
      font-family: var(--font-body);
    }
    .next-btn:hover { background: #79b8ff; }

    /* Stats */
    .stats-bar {
      height: 6px;
      background: var(--border);
      border-radius: 3px;
      overflow: hidden;
    }
    .stats-fill {
      height: 100%;
      border-radius: 3px;
      transition: width 0.5s;
    }

    /* Pulse animation */
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }
    .pulse { animation: pulse 2s infinite; }

    /* Fade in */
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .fade-in { animation: fadeIn 0.3s ease forwards; }

    @media (max-width: 480px) {
      .auth-card { padding: 28px 20px; }
      .action-grid { grid-template-columns: 1fr 1fr; }
    }
  </style>
</head>

explanation:"S\u0131fat listesi: 'and'.",rule:"S\u0131fat listesi: A, B, and C.",difficulty:"kolay"},{id:814,topicId:8,passage:"By the time the concert began, most of the audience ___ arrived.",options:["A) already","B) had already","C) has already","D) is already"],answer:"B",explanation:"'By the time + began (past)' \u2192 Past Perfect.",rule:"By the time (past) \u2192 Past Perfect.",difficulty:"orta"},{id:815,topicId:8,passage:"She was tired ___ determined to finish the project.",options:["A) or","B) but","C) nor","D) for"],answer:"B",explanation:"Z\u0131tl\u0131k: yorgun AMA kararl\u0131. 'but'.",rule:"'tired but determined' = z\u0131tl\u0131k.",difficulty:"kolay"},{id:816,topicId:8,passage:"By the time the firefighters arrived, the fire ___ the entire building.",options:["A) consumed","B) has consumed","C) had consumed","D) was consuming"],answer:"C",explanation:"'By the time + arrived (past)' \u2192 Past Perfect.",rule:"By the time (past) \u2192 Past Perfect.",difficulty:"orta"},{id:817,topicId:8,passage:"She had been studying for hours when she finally ___ the answer.",options:["A) had found","B) found","C) finds","D) has found"],answer:"B",explanation:"'had been studying... when' \u2192 Simple Past.",rule:"Past Perfect Continuous + when \u2192 Simple Past.",difficulty:"zor"},{id:818,topicId:8,passage:"The team's goal was to win the championship ___ to inspire the next generation.",options:["A) or","B) and","C) but also","D) as well as"],answer:"B",explanation:"'to win... and to inspire...' \u2014 paralel to + infinitive.",rule:"to + verb listesi: and ekle.",difficulty:"orta"},{id:901,topicId:9,passage:"The loud music had a negative ___ on her ability to concentrate.",options:["A) affect","B) effect","C) affects","D) effects on"],answer:"B",explanation:"'a negative ___' = 'a' var \u2192 isim \u2192 effect.",rule:"RAVEN: 'a/an/the' + effect (isim).",difficulty:"kolay"},{id:902,topicId:9,passage:"Pollution can significantly ___ the health of people.",options:["A) effect","B) effects","C) affect","D) affecting"],answer:"C",explanation:"'can ___' = modal + fiil \u2192 affect.",rule:"Modal sonras\u0131 fiil \u2192 affect.",difficulty:"kolay"},{id:903,topicId:9,passage:"She is much taller ___ her younger brother.",options:["A) then","B) than","C) as","D) from"],answer:"B",explanation:"Kar\u015f\u0131la\u015ft\u0131rma \u2192 than.",rule:"than = kar\u015f\u0131la\u015ft\u0131rma.",difficulty:"kolay"},{id:904,topicId:9,passage:"The new policy resulted in ___ waste being produced.",options:["A) fewer","B) less","C) little","D) small"],answer:"B",explanation:"'waste' = say\u0131lamaz \u2192 less.",rule:"less = say\u0131lamaz isimler.",difficulty:"orta"},{id:905,topicId:9,passage:"There were ___ applicants than the company expected.",options:["A) less","B) fewer","C) lower","D) smaller"],answer:"B",explanation:"'applicants' = say\u0131labilir \u2192 fewer.",rule:"fewer = say\u0131labilir isimler.",difficulty:"kolay"},{id:906,topicId:9,passage:"First gather materials, ___ begin assembling.",options:["A) than","B) then","C) when","D) after which"],answer:"B",explanation:"Zaman s\u0131ras\u0131 \u2192 then.",rule:"then = zaman s\u0131ras\u0131.",difficulty:"kolay"},{id:907,topicId:9,passage:"The ___ of the new drug on patients was studied for years.",options:["A) affect","B) effects","C) affecting","D) affected"],answer:"B",explanation:"'The ___' = 'the' var \u2192 isim \u2192 effects.",rule:"'the' + isim \u2192 effects.",difficulty:"orta"},{id:908,topicId:9,passage:"Climate change ___ weather patterns globally.",options:["A) effects","B) affects","C) effect","D) affected"],answer:"B",explanation:"Fiil gerekiyor \u2192 affects.",rule:"Fiil konumunda \u2192 affects.",difficulty:"kolay"},{id:909,topicId:9,passage:"She is more qualified ___ the other candidates.",options:["A) then","B) from","C) than","D) as"],answer:"C",explanation:"Kar\u015f\u0131la\u015ft\u0131rma \u2192 than.",rule:"than = kar\u015f\u0131la\u015ft\u0131rma.",difficu han","D) fewer, then"],answer:"C",explanation:"'rainfall' = say\u0131lamaz \u2192 less. Kar\u015f\u0131la\u015ft\u0131rma \u2192 than.",rule:"less (say\u0131lamaz) + than.",difficulty:"orta"},{id:918,topicId:9,passage:"The library has ___ books on this topic ___ I expected.",options:["A) fewer, than","B) less, than","C) fewer, then","D) less, then"],answer:"A",explanation:"'books' = say\u0131labilir \u2192 fewer. Kar\u015f\u0131la\u015ft\u0131rma \u2192 than.",rule:"fewer (say\u0131labilir) + than.",difficulty:"orta"},{id:1001,topicId:10,passage:"The athlete trained ___ for months before the championship.",options:["A) intense","B) intensely","C) more intense","D) with intensity"],answer:"B",explanation:"'trained' = fiil \u2192 zarf. intensely.",rule:"Fiil \u2192 ZARF (-ly).",difficulty:"kolay"},{id:1002,topicId:10,passage:"After hearing the sad news, she felt ___.",options:["A) sadly","B) bad","C) badly","D) more sad"],answer:"B",explanation:"'felt' = duygu fiili \u2192 s\u0131fat. bad. (felt badly = yanl\u0131\u015f)",rule:"Duygu fiili \u2192 SIFAT. felt BAD.",difficulty:"orta"},{id:1003,topicId:10,passage:"The speaker presented her argument ___.",options:["A) clear","B) clearing","C) clearly","D) more clear"],answer:"C",explanation:"'presented' = fiil \u2192 zarf. clearly.",rule:"Fiil \u2192 ZARF (-ly).",difficulty:"kolay"},{id:1004,topicId:10,passage:"The soup smells ___.",options:["A) badly","B) bad","C) in a bad way","D) more badly"],answer:"B",explanation:"'smells' = duyu fiili \u2192 s\u0131fat. bad.",rule:"Duyu fiili \u2192 SIFAT.",difficulty:"orta"},{id:1005,topicId:10,passage:"She performed ___ on the final exam.",options:["A) surprising good","B) surprisingly good","C) surprisingly well","D) surprising well"],answer:"C",explanation:"'performed' = fiil \u2192 well (zarf). 'surprisingly' zarf\u0131 niteler.",rule:"Fiil \u2192 well. Zarf \u2192 surprisingly.",difficulty:"zor"},{id:1006,topicId:10,passage:"He looked ___ after his vacation.",options:["A) happ mp' vadiye bak\u0131yor.","D) Yanl\u0131\u015f \u2014 'set up' yanl\u0131\u015f."],answer:"A",explanation:"'Overlooking the valley' \u2192 'the hikers' vadiye bak\u0131yor. Mant\u0131kl\u0131.",rule:"Modifier: Vadiye bakan = y\u00fcr\u00fcy\u00fc\u015f\u00e7\u00fcler. Do\u011fru.",difficulty:"orta"},{id:776,topicId:7,passage:"Confused by the instructions, the furniture was incorrectly assembled.",options:["A) Confused by the instructions, the furniture was incorrectly assembled.","B) Confused by the instructions, he assembled the furniture incorrectly.","C) The furniture, confused by the instructions, was incorrectly assembled.","D) De\u011fi\u015fiklik gerekmez."],answer:"B",explanation:"Kim \u015fa\u015f\u0131rd\u0131? He.",rule:"Dangling: Eylemi yapan \u00f6zne virg\u00fclden sonra.",difficulty:"kolay"},{id:777,topicId:7,passage:"Walking along the beach, a beautiful shell was found.",options:["A) Walking along the beach, a beautiful shell was found.","B) Walking along the beach, she found a beautiful shell.","C) A beautiful shell, walking along the beach, was found.","D) De\u011fi\u015fiklik gerekmez."],answer:"B",explanation:"Kim y\u00fcr\u00fcyordu? She.",rule:"Modifier: Kim y\u00fcr\u00fcd\u00fc? \u2192 Virg\u00fclden sonra.",difficulty:"kolay"},{id:778,topicId:7,passage:"Written in the 18th century, modern readers still enjoy the novel.",options:["A) Do\u011fru \u2014 'the novel' 18. y\u00fczy\u0131lda yaz\u0131ld\u0131.","B) Yanl\u0131\u015f \u2014 okuyucular 18. y\u00fczy\u0131lda yaz\u0131ld\u0131.","C) Do\u011fru \u2014 'readers' 18. y\u00fczy\u0131lda yaz\u0131ld\u0131.","D) Yanl\u0131\u015f \u2014 'still' yanl\u0131\u015f."],answer:"A",explanation:"'Written in the 18th century' \u2192 'the novel' o d\u00f6nemde yaz\u0131ld\u0131. Mant\u0131kl\u0131.",rule:"Modifier: Yaz\u0131lan = roman. Do\u011fru.",difficulty:"zor"},{id:779,topicId:7,passage:"Inspired by the story, a film was made by the director.",options:["A) Inspired by the story, a film was made by the director.","B) Inspired by the story, the director made a film.","C) A film, inspired by the story, was made by the director.","D) De\u011fi\u015fiklik gerekmez."],answer:"B",explanation:"Kim ilhamland\u0131? Y\u00f6netmen.",rule:"Modifier: Kim ilhamland\u0131? \u2192 Virg\u00fclden sonra.",difficulty:"orta"},{id:780,topicId:7,passage:"Rushing to meet the deadline, several mistakes were made.",options:["A) Rushing to meet the deadline, several mistakes were made.","B) Rushing to meet the deadline, the editor made several mistakes.","C) Several mistakes, rushing to meet the deadline, were made.","D) De\u011fi\u015fiklik gerekmez."],answer:"B",explanation:"Kim acele ediyordu? Edit\u00f6r.",rule:"Dangling: Eylemi yapan \u00f6zne virg\u00fclden sonra.",difficulty:"kolay"},{id:781,topicId:7,passage:"Restored to its original state, visitors now enjoy the historic building.",options:["A) Do\u011fru \u2014 'the historic building' restore edildi.","B) Yanl\u0131\u015f \u2014 ziyaret\u00e7iler restore edildi.","C) Do\u011fru \u2014 'visitors' restore edildi.","D) Yanl\u0131\u015f \u2014 'now' yanl\u0131\u015f."],answer:"A",explanation:"'Restored to its original state' \u2192 'the historic building' restore edildi. Mant\u0131kl\u0131.",rule:"Modifier: Restore edilen = bina. Do\u011fru.",difficulty:"zor"},{id:782,topicId:7,passage:"To prepare for the exam, ___ must be reviewed thoroughly.",options:["A) the material","B) students must review the material","C) reviewing the material by students","D) the material should be reviewed by students"],answer:"B",explanation:"Kim haz\u0131rlan\u0131yor? \u00d6\u011frenciler.",rule:"To + fiil modifier \u2192 Sonra \u00f6zne.",difficulty:"orta"},{id:869,topicId:8,passage:"She not only finished the project on time but also ___ it under budget.",options:["A) delivering","B) to deliver","C) delivered","D) deliver"],answer:"C",explanation:"not only A but also B. A = 'finished' (past). B = 'delivered' (past).",rule:"not only...but also \u2192 Ayn\u0131 form.",difficulty:"orta"},{id:870,topicId:8,passage:"The report not only identified the problems but also ___ potential solutions.",options:["A) suggesting","B) suggested","C) to suggest","D) suggestion of"],answer:"B",explanation:"not only A but also B. A = 'identified'. B = 'suggested'.",rule:"not only...but also \u2192 Ayn\u0131 form (past).",difficulty:"orta"},{id:871,topicId:8,passage:"The scientists collected data, analyzed their findings, ___ published the results.",options:["A) and to publish","B) publishing","C) and published","D) to publish"],answer:"C",explanation:"'collected, analyzed, published' = past simple listesi.",rule:"Paralel: Past simple listesi.",difficulty:"kolay"},{id:872,topicId:8,passage:"She has worked at the company since she ___ her degree.",options:["A) has earned","B) earned","C) earns","D) had earned"],answer:"B",explanation:"'has worked since' + noktasal ge\u00e7mi\u015f eylem \u2192 Simple Past.",rule:"since + Simple Past noktasal eylem.",difficulty:"zor"},{id:873,topicId:8,passage:"The artist's work is elegant, evocative, ___ deeply personal.",options:["A) and deeply personal","B) with deep personal touch","C) and showing deep personality","D) also deeply personal"],answer:"A",explanation:"S\u0131fat listesi. 'and deeply personal'.",rule:"Paralel s\u0131fat listesi.",difficulty:"kolay"},{id:874,topicId:8,passage:"The team's goal was to win the championship ___ to inspire the next generation.",options:["A) or","B) and","C) but also","D) as well as"],answer:"B",explanation:"'to win... and to inspire...' \u2014 paralel to + infinitive.",rule:"to + verb listesi: and ekle.",difficulty:"orta"},{id:875,topicId:8,passage:"She is an excellent teacher, a dedicated mentor, ___ a tireless advocate.",options:["A) and being a tireless advocate","B) also a tireless advocate","C) and a tireless advocate","D) while a tireless advocate"],answer:"C",explanation:"\u0130sim listesi: 'teacher, mentor, and advocate'.",rule:"Paralel isim listesi.",difficulty:"kolay"},{id:876,topicId:8,passage:"By 2030, renewable energy ___ 50% of global electricity production.",options:["A) will supply","B) supplies","C) supplied","D) will have supplied"],answer:"D",explanation:"By 2030 (gelecekte bir nokta) \u2192 Future Perfect.",rule:"By + gelecek \u2192 Future Perfect.",difficulty:"zor"},{id:877,topicId:8,passage:"He had never seen such a large crowd before he ___ the stadium.",options:["A) entered","B) enters","C) has entered","D) had entered"],answer:"A",explanation:"'had never seen... before he ___'. Ge\u00e7mi\u015fte = Simple Past.",rule:"before + Simple Past.",difficulty:"zor"},{id:878,topicId:8,passage:"The document was reviewed, revised, ___ finally approved by all parties.",options:["A) and to approve","B) or approved","C) and finally approved","D) also approved"],answer:"C",explanation:"Passive verb listesi: 'reviewed, revised, and approved'.",rule:"Paralel: Passive past listesi.",difficulty:"kolay"},{id:879,topicId:8,passage:"The company expanded rapidly in Asia, established a European presence, ___ penetrated the North American market.",options:["A) and penetrating","B) to penetrate","C) and penetrated","D) it penetrated"],answer:"C",explanation:"'expanded, established, penetrated' = past simple.",rule:"Paralel: Past simple listesi.",difficulty:"kolay"},{id:880,topicId:8,passage:"She was asked to present the findings, answer questions, ___ prepare a written summary.",options:["A) and preparing","B) and prepare","C) to prepare","D) also to prepare"],answer:"B",explanation:"'to present, answer, ___ prepare'. Base verb devam.",rule:"to + verb listesi: Base verb.",difficulty:"orta"},{id:881,topicId:8,passage:"The workshop was designed to help participants develop new skills, ___ existing knowledge, and build professional networks.",options:["A) to deepen","B) deepening","C) deepen","D) the deepening of"],answer:"C",explanation:"'to develop, ___ [deepen], and build'. Base verb devam.",rule:"to + verb listesi: Base verb devam eder.",difficulty:"orta"},{id:882,topicId:8,passage:"The policy aims to protect consumers, prevent fraud, ___ ensure transparency.",options:["A) and ensuring","B) to ensure","C) and ensure","D) ensuring"],answer:"C",explanation:"'to protect, prevent, ___ ensure'. Base verb devam.",rule:"to + verb listesi: and + base verb.",difficulty:"kolay"},{id:969,topicId:9,passage:"The temperature today is lower ___ it was yesterday.",options:["A) then","B) than","C) from","D) as"],answer:"B",explanation:"Kar\u015f\u0131la\u015ft\u0131rma \u2192 than.",rule:"than = kar\u015f\u0131la\u015ft\u0131rma.",difficulty:"kolay"},{id:970,topicId:9,passage:"She arrived ___ expected and caught everyone off guard.",options:["A) early then","B) earlier then","C) earlier than","D) more early than"],answer:"C",explanation:"Kar\u015f\u0131la\u015ft\u0131rma: 'earlier than'.",rule:"earlier than = kar\u015f\u0131la\u015ft\u0131rma.",difficulty:"kolay"},{id:971,topicId:9,passage:"The study ___ the researchers to change their original hypothesis.",options:["A) affected","B) effected","C) effect","D) affect"],answer:"A",explanation:"Ge\u00e7mi\u015f zaman fiil \u2192 affected.",rule:"affected = past tense of affect (fiil).",difficulty:"orta"},{id:972,topicId:9,passage:"There are ___ options available now ___ there were last year.",options:["A) fewer, than","B) less, than","C) lower, than","D) smaller, than"],answer:"A",explanation:"'options' = say\u0131labilir \u2192 fewer. Kar\u015f\u0131la\u015ft\u0131rma \u2192 than.",rule:"fewer (say\u0131labilir) + than.",difficulty:"kolay"},{id:973,topicId:9,passage:"He spoke for ___ time ___ anyone expected.",options:["A) less, then","B) more, than","C) fewer, than","D) less, than"],answer:"B",explanation:"'time' = say\u0131lamaz. Kar\u015f\u0131la\u015ft\u0131rma \u2192 more than.",rule:"more than = kar\u015f\u0131la\u015ft\u0131rma.",difficulty:"orta"},{id:974,topicId:9,passage:"She is a ___ experienced teacher ___ her colleague.",options:["A) more, then","B) less, then","C) more, than","D) less, than"],answer:"C",explanation:"Kar\u015f\u0131la\u015ft\u0131rma: 'more experienced than'.",rule:"more + adj + than.",difficulty:"kolay"},{id:975,topicId:9,passage:"The city has ___ parks ___ the neighboring town.",options:["A) fewer, than","B) less, than","C) fewer, then","D) less, then"],answer:"A",explanation:"'parks' = say\u0131labilir \u2192 fewer. Kar\u015f\u0131la\u015ft\u0131rma \u2192 than.",rule:"fewer (say\u0131labilir) + than.",difficulty:"kolay"},{id:976,topicId:9,passage:"The positive ___ of regular exercise on mental health are well-documented.",options:["A) affects","B) effects","C) affect","D) effective"],answer:"B",explanation:"C\u00fcmlenin \u00f6znesi \u2192 effects (\u00e7o\u011ful isim).",rule:"The effects = \u00e7o\u011ful isim.",difficulty:"orta"},{id:977,topicId:9,passage:"She is no ___ confident ___ she was before the training.",options:["A) more, then","B) more, than","C) less, then","D) less, than"],answer:"B",explanation:"Kar\u015f\u0131la\u015ft\u0131rma: 'no more confident than'.",rule:"more/less + than.",difficulty:"orta"},{id:978,topicId:9,passage:"The noise from the construction site ___ my ability to work.",options:["A) effects","B) affects","C) effect","D) a negative effect on"],answer:"B",explanation:"Fiil konumunda \u2192 affects.",rule:"Fiil konumunda \u2192 affects.",difficulty:"kolay"},{id:979,topicId:9,passage:"She completed the first chapter, ___ moved on to the second.",options:["A) than","B) and then","C) when","D) therefore"],answer:"B",explanation:"Zaman s\u0131ras\u0131 \u2192 and then.",rule:"and then = s\u0131ralama.",difficulty:"kolay"},{id:980,topicId:9,passage:"The medicine ___ the symptoms but does not cure the underlying disease.",options:["A) effects","B) affects","C) effect","D) is affecting"],answer:"B",explanation:"Fiil konumunda \u2192 affects.",rule:"Fiil konumunda \u2192 affects.",difficulty:"kolay"},{id:981,topicId:9,passage:"The scientists believe ___ experiments are needed to confirm the results.",options:["A) less","B) fewer","C) lower","D) smaller"],answer:"B",explanation:"'experiments' = say\u0131labilir \u2192 fewer.",rule:"fewer = say\u0131labilir.",difficulty:"kolay"},{id:982,topicId:9,passage:"The ___ of sleep deprivation on the immune system is alarming.",options:["A) affect","B) effect","C) affecting","D) affected"],answer:"B",explanation:"'The ___' = tekil isim \u2192 effect.",rule:"The effect = tekil isim.",difficulty:"orta"},{id:1069,topicId:10,passage:"She spoke ___ at the press conference.",options:["A) confident","B) confidently","C) more confident","D) with confidence"],answer:"B",explanation:"'spoke' = fiil \u2192 zarf. confidently.",rule:"Fiil \u2192 ZARF (-ly).",difficulty:"kolay"},{id:1070,topicId:10,passage:"The painting looked ___ under the museum's lighting.",options:["A) differently","B) different","C) more differently","D) most different"],answer:"B",explanation:"'looked' = g\u00f6r\u00fcn\u00fc\u015f fiili \u2192 s\u0131fat. different.",rule:"look \u2192 SIFAT.",difficulty:"orta"},{id:1071,topicId:10,passage:"He spoke ___ but effectively at the conference.",options:["A) brief","B) briefly","C) more brief","D) with brevity"],answer:"B",explanation:"'spoke' = fiil \u2192 zarf. briefly. Paralel: briefly but effectively.",rule:"Fiil \u2192 ZARF (-ly).",difficulty:"kolay"},{id:1072,topicId:10,passage:"She performed ___ under pressure than in practice sessions.",options:["A) more well","B) better","C) more better","D) gooder"],answer:"B",explanation:"'performed' = fiil \u2192 zarf. 'well'in kar\u015f\u0131la\u015ft\u0131rmas\u0131 = better.",rule:"'well'in kar\u015f\u0131la\u015ft\u0131rmas\u0131 = better.",difficulty:"orta"},{id:1073,topicId:10,passage:"The fabric feels ___ and luxurious.",options:["A) softly","B) soft","C) more softly","D) with softness"],answer:"B",explanation:"'feels' = duyu fiili \u2192 s\u0131fat. soft.",rule:"feel \u2192 SIFAT.",difficulty:"orta"},{id:1074,topic ion' tekrar + 'ultimately' gereksiz + 'that was reached' pasif. B veya C daha k\u0131sa.",rule:"final conclusion + ultimately = gereksiz tekrar.",difficulty:"zor"},{id:3424,topicId:14,passage:"She gave a brief summary overview of the key main points of the proposal.",options:["A) a brief summary overview of the key main points","B) a summary of the main points","C) a brief overview of the key points","D) B veya C do\u011fru"],answer:"D",explanation:"'brief' + 'summary' + 'overview' = \u00fc\u00e7l\u00fc. 'key' + 'main' = ikili tekrar.",rule:"\u00c7oklu gereksiz niteleme.",difficulty:"zor"},{id:3425,topicId:14,passage:"The report was written in a clear and understandable way that was easy to follow.",options:["A) in a clear and understandable way that was easy to follow","B) clearly","C) in a clear manner","D) B en k\u0131sa ve do\u011fru"],answer:"D",explanation:"'clear', 'understandable', 'easy to follow' = \u00fc\u00e7l\u00fc tekrar. 'clearly' yeterli.",rule:"\u00dc\u00e7l\u00fc gereksiz tekrar.",difficulty:"zor"},{id:3426,topicId:14,passage:"The committee convened a meeting to discuss and deliberate on the ongoing current situation.",options:["A) convened a meeting to discuss and deliberate on the ongoing current situation","B) met to discuss the situation","C) convened to deliberate on the current situation","D) B en k\u0131sa ve do\u011fru"],answer:"D",explanation:"'convened a meeting' gereksiz. 'discuss and deliberate' tekrar. 'ongoing current' tekrar.",rule:"\u00c7oklu gereksiz ifade.",difficulty:"zor"},{id:3427,topicId:14,passage:"The methodology employed was designed to minimize and reduce potential sources of bias.",options:["A) minimize and reduce potential sources of bias","B) minimize potential bias","C) reduce sources of bias","D) B veya C do\u011fru"],answer:"D",explanation:"'minimize and reduce' = tekrar. 'potential sources of bias' \u2192 'potential bias'. B veya C.",rule:"minimize and reduce = tekrar.",difficulty:"zor"},{id:3428,topicId:14,passage:"The key essential components of the strategy are outlined in the following subsequent section.",options:["A) key essential components...following subsequent section","B) key components...following section","C) essential elements...next section","D) B veya C do\u011fru"],answer:"D",explanation:"'key' + 'essential' tekrar. 'following' + 'subsequent' tekrar. B veya C.",rule:"\u00c7ift tekrar: key/essential, following/subsequent.",difficulty:"zor"},{id:3429,topicId:14,passage:"The document provides a comprehensive and thorough analysis of all the various different factors involved.",options:["A) a comprehensive and thorough analysis of all the various different factors","B) a comprehensive analysis of the factors involved","C) a thorough analysis of all factors","D) B veya C do\u011fru"],answer:"D",explanation:"'comprehensive and thorough' tekrar. 'all the various different' \u00fc\u00e7l\u00fc tekrar.",rule:"\u00c7oklu gereksiz niteleme.",difficulty:"zor"},{id:3430,topicId:14,passage:"It is absolutely essential and critically important that the submission deadline be met.",options:["A) absolutely essential and critically important","B) essential","C) critical","D) B veya C do\u011fru"],answer:"D",explanation:"'absolutely essential' + 'critically important' = ayn\u0131 anlam iki kez. Birini se\u00e7.",rule:"essential + critical = anlam tekrar\u0131.",difficulty:"zor"},{id:3431,topicId:14,passage:"The new initiative is a completely novel approach that offers an innovative new way of thinking about the problem.",options:["A) a completely novel approach that offers an innovative new way of thinking","B) a novel approach","C) an innovative approach","D) B veya C do\u011fru"],answer:"D",explanation:"'completely novel', 'innovative new' = iki katl\u0131 tekrar. 'approach' + 'way of thinking' gereksiz.",rule:"\u00c7oklu gereksiz tekrar.",difficulty:"zor"},{id:3432,topicId:14,passage:"She was the first person ever to have pioneered this approach in the field.",options:["A) the first person ever to have pioneered","B) the first to pioneer","C) the pioneer","D) B veya C do\u011fru"],answer:"D",explanation:"'first' + 'pioneered' = tekrar ('pioneer' = ilk yapan). 'ever to have' gereksiz.",rule:"first + pioneer = anlam tekrar\u0131.",difficulty:"zor"},{id:3433,topicId:14,passage:"The study drew final and definitive conclusions from the data that it collected and gathered.",options:["A) drew final and definitive conclusions from the data that it collected and gathered","B) drew definitive conclusions from the collected data","C) concluded from the data","D) B veya C do\u011fru"],answer:"D",explanation:"'final and definitive' tekrar. 'collected and gathered' tekrar. B veya C.",rule:"\u0130ki ayr\u0131 anlam tekrar\u0131.",difficulty:"zor"},{id:3434,topicId:14,passage:"The director offered her personal and individual view on the matter during the recorded interview.",options:["A) her personal and individual view","B) her view","C) her personal view","D) B veya C do\u011fru"],answer:"D",explanation:"'personal' + 'individual' = tekrar. 'view' yeterli, ya da 'personal view'.",rule:"personal + individual = anlam tekrar\u0131.",difficulty:"zor"},{id:3435,topicId:14,passage:"The meeting was organized for the express purpose of discussing and talking about the proposed changes.",options:["A) for the express purpose of discussing and talking about","B) to discuss","C) for the purpose of discussing","D) B en k\u0131sa ve do\u011fru"],answer:"D",explanation:"'for the express purpose of' gereksiz. 'discussing and talking about' tekrar. 'to discuss' yeterli.",rule:"for the express purpose of + discussing/talking = gereksiz.",difficulty:"zor"},{id:3436,topicId:14,passage:"The underlying root cause of the persistent ongoing problem was identified as inadequate training.",options:["A) The underlying root cause of the persistent ongoing problem","B) The root cause of the persistent problem","C) The cause of the problem","D) B veya C do\u011fru"],answer:"D",explanation:"'underlying root' tekrar. 'persistent ongoing' tekrar. B veya C.",rule:"underlying + root, persistent + ongoing = tekrar.",difficulty:"zor"},{id:3437,topicId:14,passage:"The researchers successfully managed to achieve their intended goal of completing the study within the scheduled timeframe.",options:["A) successfully managed to achieve their intended goal of completing","B) completed","C) achieved their goal of completing","D) B en k\u0131sa ve do\u011fru"],answer:"D",explanation:"'successfully managed to achieve', 'intended goal', 'completing' = \u00fc\u00e7l\u00fc gereksiz. 'completed' yeterli.",rule:"\u00dc\u00e7l\u00fc gereksiz ifade \u2192 completed.",difficulty:"zor"},{id:3438,topicId:14,passage:"The fact of the matter is that there is a need for additional further research to be conducted.",options:["A) The fact of the matter is that there is a need for additional further research to be conducted.","B) Further research is needed.","C) Additional research must be conducted.","D) B veya C do\u011fru"],answer:"D",explanation:"'The fact of the matter is that' + 'additional further' + 'to be conducted' = \u00fc\u00e7l\u00fc gereksiz. B veya C.",rule:"\u00dc\u00e7l\u00fc gereksiz ifade.",difficulty:"zor"},{id:3439,topicId:14,passage:"The annual review occurs each and every year, providing a regular and consistent assessment of performance.",options:["A) annual review occurs each and every year...regular and consistent","B) annual review provides a consistent assessment","C) annual review assesses performance","D) B veya C do\u011fru"],answer:"D",explanation:"'annual' + 'each and every year' + 'regular and consistent' = \u00e7oklu tekrar.",rule:"\u00c7oklu gereksiz tekrar.",difficulty:"zor"},,{id:4001,topicId:15,passage:"While researching the effects of caffeine on cognitive performance, a student learned that moderate caffeine intake can improve alertness and concentration. ___, excessive consumption has been linked to anxiety, insomnia, and diminished cognitive function.",options:["A) For example","B) Furthermore","C) However","D) Similarly"],answer:"C",explanation:"İlk cümle olumlu etki, ikinci cümle olumsuz → ZITLIK. However.",rule:"Zıtlık → However, Nevertheless, Yet",difficulty:"orta"},{id:4002,topicId:15,passage:"A 2019 study found that urban green spaces significantly reduce stress levels among city residents. ___, a follow-up study in 2021 revealed that the benefits diminish substantially if the green spaces are poorly maintained.",options:["A) In addition","B) For instance","C) Nevertheless","D) Therefore"],answer:"C",explanation:"Pozitif bulgu → sınırlayan bulgu = ZITLIK. Nevertheless.",rule:"Zıtlık → Nevertheless",difficulty:"zor"},{id:4003,topicId:15,passage:"The new solar panel design achieved a 40% increase in energy conversion efficiency. ___, the manufacturing process proved to be three times more expensive than conventional methods.",options:["A) As a result","B) Specifically","C) Moreover","D) However"],answer:"D",explanation:"Verimlilik artışı (+) → maliyet yüksek (−) = ZITLIK.",rule:"Zıtlık → However",difficulty:"orta"},{id:4004,topicId:15,passage:"Critics praised the director's use of natural lighting and long takes as innovative. ___, the film's unconventional narrative structure alienated some viewers who expected a more traditional storyline.",options:["A) Similarly","B) In other words","C) On the other hand","D) Therefore"],answer:"C",explanation:"Eleştirmenler övdü → izleyiciler yabancılaştı = farklı perspektif.",rule:"Zıtlık → On the other hand",difficulty:"zor"},{id:4005,topicId:15,passage:"The ancient Mayan civilization developed a sophisticated writing system and an advanced understanding of astronomy. ___, much of their knowledge was lost following the Spanish conquest in the sixteenth century.",options:["A) Furthermore","B) For example","C) Unfortunately","D) In addition"],answer:"C",explanation:"Gelişmiş medeniyet → bilgi kayboldu = olumsuz kontrast.",rule:"Üzücü kontrast → Unfortunately",difficulty:"zor"},{id:4006,topicId:15,passage:"Dr. Patel's research demonstrated that the drug effectively reduced inflammation in laboratory settings. ___, clinical trials with human subjects yielded inconsistent results.",options:["A) Consequently","B) In fact","C) Similarly","D) However"],answer:"D",explanation:"Lab'da etkili → klinik tutarsız = ZITLIK.",rule:"Zıtlık → However",difficulty:"orta"},{id:4007,topicId:15,passage:"The architect's proposal for the new civic center was widely admired for its bold, futuristic design. ___, the city council rejected the proposal, citing concerns about its projected cost.",options:["A) In contrast","B) Accordingly","C) Furthermore","D) Nevertheless"],answer:"D",explanation:"Beğenildi → reddedildi = beklentiye aykırı.",rule:"Beklentiye aykırı → Nevertheless",difficulty:"zor"},{id:4008,topicId:15,passage:"The playwright's early works were characterized by spare, minimalist dialogue. ___, her later plays embraced elaborate staging and densely layered verbal exchanges.",options:["A) Similarly","B) In addition","C) By contrast","D) As a result"],answer:"C",explanation:"Erken dönem minimalist → geç dönem gösterişli = KONTRAST.",rule:"Zaman karşılaştırması → By contrast",difficulty:"zor"},{id:4009,topicId:15,passage:"The region experienced its worst drought in recorded history, devastating crop yields across thousands of hectares. ___, the government declared a state of emergency and allocated $2 billion in disaster relief.",options:["A) However","B) For instance","C) As a result","D) Similarly"],answer:"C",explanation:"Kuraklık (sebep) → acil durum (sonuç).",rule:"Sebep-sonuç → As a result",difficulty:"kolay"},{id:4010,topicId:15,passage:"Researchers discovered that the compound was toxic to aquatic organisms at concentrations previously considered safe. ___, regulatory agencies revised the permissible discharge limits for the chemical.",options:["A) In contrast","B) Consequently","C) For example","D) Meanwhile"],answer:"B",explanation:"Toksik bulundu → limitler revize edildi.",rule:"Sebep-sonuç → Consequently",difficulty:"orta"},{id:4011,topicId:15,passage:"The introduction of ride-sharing services significantly reduced demand for traditional taxi services. ___, several long-established taxi companies were forced to file for bankruptcy.",options:["A) In addition","B) On the other hand","C) Thus","D) For instance"],answer:"C",explanation:"Talep düştü → iflas.",rule:"Sebep-sonuç → Thus",difficulty:"orta"},{id:4012,topicId:15,passage:"The pandemic forced many companies to adopt remote work policies. ___, the commercial real estate market experienced a sharp decline as demand for office space plummeted.",options:["A) Similarly","B) However","C) As a consequence","D) In other words"],answer:"C",explanation:"Uzaktan çalışma → ofis talebi düştü.",rule:"Sebep-sonuç → As a consequence",difficulty:"orta"},{id:4013,topicId:15,passage:"The new legislation imposed strict limits on carbon emissions from industrial facilities. ___, many manufacturers invested heavily in cleaner production technologies.",options:["A) Nevertheless","B) In contrast","C) Accordingly","D) Furthermore"],answer:"C",explanation:"Yasa çıktı → uygun yatırım yapıldı.",rule:"Sebep-sonuç → Accordingly",difficulty:"zor"},{id:4014,topicId:15,passage:"The scholarship program provides full tuition coverage for qualifying students. ___, recipients are guaranteed paid internships with partnering organizations during the summer months.",options:["A) However","B) In addition","C) In contrast","D) Instead"],answer:"B",explanation:"Burs + staj = EK BİLGİ.",rule:"Ek bilgi → In addition",difficulty:"kolay"},{id:4015,topicId:15,passage:"The archaeological site yielded pottery fragments dating back to the third century BCE. ___, the team uncovered bronze tools that provided further evidence of an advanced metalworking tradition.",options:["A) Nevertheless","B) For example","C) Furthermore","D) In contrast"],answer:"C",explanation:"Çömlek + bronz aletler = EK BULGU.",rule:"Ek bilgi → Furthermore",difficulty:"orta"},{id:4016,topicId:15,passage:"Regular physical exercise has been shown to reduce the risk of cardiovascular disease. ___, it can improve mental health by reducing symptoms of anxiety and depression.",options:["A) On the other hand","B) As a result","C) Moreover","D) In contrast"],answer:"C",explanation:"Kalp risk azaltır + ruh sağlığı = EK FAYDA.",rule:"Ek bilgi → Moreover",difficulty:"kolay"},{id:4017,topicId:15,passage:"The museum's new wing features a permanent collection of Impressionist paintings. ___, it includes a multimedia installation that allows visitors to explore techniques interactively.",options:["A) However","B) Therefore","C) Instead","D) Additionally"],answer:"D",explanation:"Koleksiyon + multimedya = EK ÖZELLİK.",rule:"Ek bilgi → Additionally",difficulty:"kolay"},{id:4018,topicId:15,passage:"Several ancient civilizations independently developed systems of writing. ___, the Sumerians created cuneiform around 3400 BCE, while the Egyptians developed hieroglyphics around the same period.",options:["A) However","B) For instance","C) Therefore","D) In contrast"],answer:"B",explanation:"Genel ifade → spesifik örnekler.",rule:"Örnek → For instance",difficulty:"kolay"},{id:4019,topicId:15,passage:"Invasive species can cause significant ecological damage when introduced to non-native environments. ___, the introduction of the cane toad to Australia in 1935 led to the decline of multiple native predator species.",options:["A) Similarly","B) However","C) To illustrate","D) As a result"],answer:"C",explanation:"Genel prensip → spesifik örnek.",rule:"Örnek → To illustrate",difficulty:"orta"},{id:4020,topicId:15,passage:"Many traditional building materials have been replaced by more sustainable alternatives. ___, cross-laminated timber is now increasingly used as a substitute for concrete in mid-rise construction.",options:["A) In contrast","B) Therefore","C) Nevertheless","D) Specifically"],answer:"D",explanation:"Genel ifade → spesifik detay.",rule:"Detay → Specifically",difficulty:"zor"},{id:4021,topicId:15,passage:"The discovery of penicillin in 1928 revolutionized the treatment of bacterial infections. ___, the development of the polio vaccine in the 1950s dramatically reduced the incidence of a disease that had paralyzed thousands each year.",options:["A) However","B) In contrast","C) Similarly","D) Specifically"],answer:"C",explanation:"İki benzer devrimci buluş.",rule:"Benzerlik → Similarly",difficulty:"orta"},{id:4022,topicId:15,passage:"In the early twentieth century, jazz musicians in New Orleans blended African rhythmic traditions with European harmonic structures. ___, in Brazil, musicians fused African percussion with Portuguese melodic forms to develop bossa nova.",options:["A) For example","B) Likewise","C) In contrast","D) Therefore"],answer:"B",explanation:"İki paralel müzik gelişimi.",rule:"Benzerlik → Likewise",difficulty:"zor"},{id:4023,topicId:15,passage:"The study found that students in the mentoring program showed a 15% improvement in reading comprehension. ___, students in the tutoring program demonstrated comparable gains in mathematical reasoning.",options:["A) In the same way","B) However","C) In contrast","D) For example"],answer:"A",explanation:"Her iki programda benzer gelişme.",rule:"Benzerlik → In the same way",difficulty:"zor"},{id:4024,topicId:15,passage:"The committee's report revealed that nearly 40% of the city's bridges were structurally deficient. ___, three of the most heavily trafficked bridges were rated as being in critical condition.",options:["A) However","B) In fact","C) For example","D) Therefore"],answer:"B",explanation:"Genel sorun → daha güçlendirici detay.",rule:"Vurgulama → In fact",difficulty:"zor"},{id:4025,topicId:15,passage:"The expedition encountered numerous setbacks, including equipment failures and severe weather. ___, the team considered abandoning the mission entirely after two members sustained serious injuries.",options:["A) For example","B) However","C) Indeed","D) As a result"],answer:"C",explanation:"Aksaklıklar → vurgulayıcı.",rule:"Vurgulama → Indeed",difficulty:"zor"},{id:4026,topicId:15,passage:"The research team first collected soil samples from twenty sites across the region. ___, they analyzed the samples for concentrations of heavy metals using mass spectrometry.",options:["A) However","B) For example","C) Next","D) Similarly"],answer:"C",explanation:"Topladılar → analiz ettiler = SIRA.",rule:"Sıra → Next",difficulty:"kolay"},{id:4027,topicId:15,passage:"The author spent three years conducting interviews with survivors of the conflict. ___, she synthesized the interviews into a comprehensive narrative that chronicled the war's impact on civilian life.",options:["A) Meanwhile","B) In contrast","C) Subsequently","D) For instance"],answer:"C",explanation:"Röportaj (önce) → sentezledi (sonra).",rule:"Sıra → Subsequently",difficulty:"orta"},{id:4028,topicId:15,passage:"California activists in the early 1900s sold specially branded tea to fund their suffrage campaigns. One activist sold over 2,000 pounds of tea in a single year. ___, activists in Oregon organized large-scale bake sales that raised comparable sums for the same cause.",options:["A) For example","B) However","C) Similarly","D) Therefore"],answer:"C",explanation:"İki benzer örnek — zaten bir örnek verilmiş → ikinci = Similarly, FOR EXAMPLE DEĞİL.",rule:"TUZAK: Zaten örnek varsa → Similarly, 'For example' değil",difficulty:"zor"},{id:4029,topicId:15,passage:"The Great Barrier Reef has lost approximately half of its coral cover since 1995. ___, marine biologists have observed that some coral species are demonstrating an unexpected capacity to adapt to warmer conditions.",options:["A) Therefore","B) In addition","C) Yet","D) For instance"],answer:"C",explanation:"Mercan kaybı → bazıları adapte = beklenmedik ZITLIK.",rule:"Beklenmedik → Yet",difficulty:"zor"},{id:4030,topicId:15,passage:"The city's new public transit system has reduced average commute times by 22 minutes. ___, ridership has exceeded projections by 35%, suggesting strong preference for rail transit.",options:["A) However","B) Moreover","C) In contrast","D) Instead"],answer:"B",explanation:"Olumlu + bir başka olumlu = EK BİLGİ. 'However' TUZAK.",rule:"Ek bilgi (iki pozitif) → Moreover",difficulty:"zor"},{id:4031,topicId:15,passage:"The rover's instruments detected trace amounts of methane in the Martian atmosphere, a finding some scientists interpreted as a possible indicator of microbial life. ___, other researchers cautioned that geological processes could produce methane without any biological activity.",options:["A) In addition","B) Therefore","C) For example","D) However"],answer:"D",explanation:"Bazıları 'yaşam' → diğerleri 'jeoloji' = karşı görüş.",rule:"Karşı görüş → However",difficulty:"zor"},{id:4032,topicId:15,passage:"Monarch butterfly populations have declined by nearly 80% over the past two decades. ___, conservation groups have launched ambitious milkweed planting programs along the migratory routes.",options:["A) Consequently","B) Furthermore","C) In response","D) Similarly"],answer:"C",explanation:"Düşüş → koruma programları = TEPKİ. 'Consequently' TUZAK.",rule:"Tepki → In response",difficulty:"zor"},{id:4033,topicId:15,passage:"Early attempts to use gene therapy to treat hereditary blindness were hindered by immune responses. ___, a team at the University of Pennsylvania developed a novel vector that could evade immune detection, paving the way for the first FDA-approved gene therapy.",options:["A) Similarly","B) Eventually","C) For example","D) In contrast"],answer:"B",explanation:"Erken girişimler başarısız → sonunda çözüm.",rule:"Zaman/sonuç → Eventually",difficulty:"zor"},{id:4034,topicId:15,passage:"The study's authors acknowledged that their sample size was relatively small, potentially limiting generalizability. ___, they noted that the consistency of results across all demographic subgroups strengthened the validity of the conclusions.",options:["A) Therefore","B) For instance","C) Nonetheless","D) In addition"],answer:"C",explanation:"Zayıflık → ama güçlü yön = ZITLIK/taviz.",rule:"Taviz → Nonetheless",difficulty:"zor"},{id:4035,topicId:15,passage:"The proposed highway expansion would reduce congestion and shorten commute times. ___, the project would require the demolition of over two hundred homes.",options:["A) In addition","B) For example","C) At the same time","D) As a result"],answer:"C",explanation:"Olumlu + eşzamanlı olumsuz.",rule:"Eşzamanlı zıtlık → At the same time",difficulty:"zor"},{id:4036,topicId:15,passage:"The novelist's debut work was dismissed by most critics as derivative. Her second novel, ___, was hailed as a masterpiece of contemporary literary fiction.",options:["A) for example","B) in addition","C) therefore","D) by contrast"],answer:"D",explanation:"İlk eleştirildi → ikinci övüldü. Cümle ortası küçük harf.",rule:"Kontrast (cümle ortası) → by contrast",difficulty:"zor"},{id:4037,topicId:15,passage:"Several European countries have successfully implemented universal preschool programs. ___, the United States has struggled to establish a comparable nationwide system due to funding challenges.",options:["A) Similarly","B) In comparison","C) Furthermore","D) As a result"],answer:"B",explanation:"Avrupa başarılı → ABD zorlanıyor = karşılaştırma ile fark.",rule:"Fark gösteren karşılaştırma → In comparison",difficulty:"zor"},{id:4038,topicId:15,passage:"The documentary chronicles the devastating effects of industrial pollution on the Great Lakes. ___, it highlights the grassroots movements that emerged in response to environmental degradation.",options:["A) However","B) It also","C) Therefore","D) In contrast"],answer:"B",explanation:"Belgesel kirlilik + hareketler = EK İÇERİK.",rule:"Ek içerik → It also",difficulty:"orta"},{id:4039,topicId:15,passage:"The company's revenue increased by 12% in the third quarter. ___, its net profit margin actually decreased due to rising operational costs.",options:["A) As a result","B) Similarly","C) Nevertheless","D) For example"],answer:"C",explanation:"Gelir arttı → kâr düştü = ZITLIK.",rule:"Zıtlık → Nevertheless",difficulty:"orta"},{id:4040,topicId:15,passage:"The vaccine demonstrated 95% efficacy in preventing severe illness in initial clinical trials. ___, its effectiveness against newly emerging variants is currently being studied.",options:["A) Consequently","B) Meanwhile","C) For instance","D) Similarly"],answer:"B",explanation:"Deney sonuçları → aynı anda varyant çalışmaları = EŞZAMANLI.",rule:"Eşzamanlı → Meanwhile",difficulty:"zor"},{id:4041,topicId:15,passage:"Many art historians regard Picasso's Guernica as the most powerful anti-war statement in the visual arts. ___, others argue that Goya's The Third of May is equally effective in conveying the brutality of conflict.",options:["A) In addition","B) However","C) Therefore","D) For example"],answer:"B",explanation:"Bir görüş → karşı görüş.",rule:"Karşı görüş → However",difficulty:"orta"},{id:4042,topicId:15,passage:"The algorithm correctly identified 97% of malignant tumors in the test dataset. ___, it misclassified several benign cysts as cancerous, which would result in unnecessary biopsies.",options:["A) Furthermore","B) For example","C) However","D) Similarly"],answer:"C",explanation:"Yüksek doğruluk → yanlış pozitifler = ZITLIK.",rule:"Zıtlık → However",difficulty:"orta"},{id:4043,topicId:15,passage:"The first phase of the restoration project focused on stabilizing the foundation and exterior walls. ___, the team turned its attention to restoring the interior frescoes and ornamental plasterwork.",options:["A) However","B) In the next phase","C) For example","D) Similarly"],answer:"B",explanation:"Birinci aşama → ikinci aşama = SIRA.",rule:"Sıra → In the next phase",difficulty:"orta"},{id:4044,topicId:15,passage:"The proposed trade agreement would eliminate tariffs on agricultural exports. ___, it would establish new environmental and labor standards that critics argue could increase production costs.",options:["A) As a result","B) For instance","C) At the same time","D) Similarly"],answer:"C",explanation:"Olumlu etki + eşzamanlı olumsuz.",rule:"Eşzamanlı → At the same time",difficulty:"zor"},{id:4045,topicId:15,passage:"The biologist spent two decades documenting monarch butterfly migration patterns. Her findings demonstrated that climate change had significantly altered the traditional routes. ___, the study's methodology has since been adopted by researchers studying other insect species.",options:["A) However","B) Notably","C) In contrast","D) For example"],answer:"B",explanation:"Çalışma yayınlandı → dikkat çekici şekilde benimsendi.",rule:"Vurgu → Notably",difficulty:"zor"},{id:4046,topicId:15,passage:"Supporters of the initiative argue that increasing the minimum wage would reduce poverty. ___, opponents contend that higher labor costs would force businesses to reduce their workforce.",options:["A) In addition","B) As a result","C) Conversely","D) For example"],answer:"C",explanation:"Destekçiler → karşıtlar = ZIT perspektifler.",rule:"Zıt perspektif → Conversely",difficulty:"zor"},{id:4047,topicId:15,passage:"The northern region receives abundant rainfall and supports dense tropical forests. ___, the southern region is predominantly arid and is characterized by scrubland and desert.",options:["A) Similarly","B) In contrast","C) Furthermore","D) Consequently"],answer:"B",explanation:"Kuzey yağışlı → güney kurak = KONTRAST.",rule:"Kontrast → In contrast",difficulty:"kolay"},{id:4048,topicId:15,passage:"The experiment required participants to abstain from caffeine for seventy-two hours. ___, each participant was asked to maintain a consistent sleep schedule during the study period.",options:["A) However","B) For example","C) Additionally","D) In contrast"],answer:"C",explanation:"Kafein kısıtlaması + uyku düzeni = EK KOŞUL.",rule:"Ek koşul → Additionally",difficulty:"kolay"},{id:4049,topicId:15,passage:"The committee unanimously approved the first three proposals on the agenda. ___, it voted to table the fourth proposal pending further review.",options:["A) Similarly","B) However","C) Therefore","D) For example"],answer:"B",explanation:"İlk üç onaylandı → dördüncü ertelendi = ZITLIK.",rule:"Zıtlık → However",difficulty:"orta"},{id:4050,topicId:15,passage:"The poet's early verse drew heavily on the Romantic tradition. Her mature work, ___, was marked by a stark, almost clinical precision that owed more to the Modernist poets.",options:["A) similarly","B) in addition","C) however","D) consequently"],answer:"C",explanation:"Erken Romantik → olgun Modernist = KONTRAST. Cümle ortası.",rule:"Kontrast (cümle ortası) → however",difficulty:"zor"},{id:5001,topicId:16,passage:"While researching the Great Wall of China, a student has taken the following notes:\n- The Great Wall stretches approximately 13,000 miles across northern China.\n- Construction began in the 7th century BCE under various Chinese states.\n- The most well-known sections were built during the Ming Dynasty (1368-1644 CE).\n- The wall was originally constructed to protect against invasions from northern nomadic groups.\n- In 1987, the Great Wall was designated a UNESCO World Heritage Site.\nThe student wants to emphasize the wall's historical purpose. Which choice most effectively uses relevant information from the notes to accomplish this goal?",options:["A) Stretching approximately 13,000 miles, the Great Wall of China was designated a UNESCO World Heritage Site in 1987.","B) Originally constructed to protect against invasions from northern nomadic groups, the Great Wall of China has been a defensive structure since the 7th century BCE.","C) The most well-known sections of the Great Wall were built during the Ming Dynasty between 1368 and 1644 CE.","D) The Great Wall of China, which stretches 13,000 miles, was built by various Chinese states beginning in the 7th century BCE."],answer:"B",explanation:"Hedef: tarihsel amaç. B, savunma amacını ve tarihi vurgular. A=UNESCO. C=Ming. D=uzunluk.",rule:"Rhetorical Synthesis: Hedefe en uygun sentez cümlesi",difficulty:"orta"},{id:5002,topicId:16,passage:"While researching the platypus, a student has taken the following notes:\n- The platypus is one of only five species of monotremes (egg-laying mammals).\n- It is native to eastern Australia and Tasmania.\n- Males possess venomous spurs on their hind legs.\n- The platypus uses electroreception to detect prey underwater.\nThe student wants to highlight what makes the platypus unique among mammals. Which choice most effectively uses relevant information from the notes to accomplish this goal?",options:["A) Native to eastern Australia and Tasmania, the platypus is one of only five species of egg-laying mammals and possesses features rarely found in other mammals, including venomous spurs and the ability to detect prey through electroreception.","B) The platypus, which is native to eastern Australia, has webbed feet and a bill resembling a duck's.","C) As one of five monotreme species, the platypus lives in eastern Australia and Tasmania.","D) Male platypuses have venomous spurs on their hind legs, and the species is native to eastern Australia."],answer:"A",explanation:"Hedef: memeliler arasında benzersizlik. A, yumurtlayan memeli + zehir + elektroresepsiyon = en kapsamlı.",rule:"Rhetorical Synthesis: Hedefe en uygun sentez cümlesi",difficulty:"zor"},{id:5003,topicId:16,passage:"While researching renewable energy, a student has taken the following notes:\n- Solar energy costs have decreased by 89% since 2010.\n- Wind energy costs have decreased by 70% since 2010.\n- In 2022, renewable sources accounted for 30% of global electricity generation.\n- Coal-fired power plants still generate approximately 36% of the world's electricity.\nThe student wants to present a comparison between renewable energy and coal. Which choice most effectively uses relevant information from the notes to accomplish this goal?",options:["A) Solar and wind energy costs have decreased dramatically since 2010, by 89% and 70% respectively.","B) Denmark and Costa Rica generate over 90% of their electricity from renewable sources.","C) Although renewable sources accounted for 30% of global electricity generation in 2022, coal-fired plants still generated approximately 36%, indicating that fossil fuels remain the dominant energy source.","D) Since 2010, the cost of solar energy has decreased by 89%, making it increasingly competitive."],answer:"C",explanation:"Hedef: yenilenebilir vs kömür KARŞILAŞTIRMASI. C, %30 vs %36 ile doğrudan karşılaştırma.",rule:"Rhetorical Synthesis: Hedefe en uygun sentez cümlesi",difficulty:"orta"},{id:5004,topicId:16,passage:"While researching the James Webb Space Telescope (JWST), a student has taken the following notes:\n- JWST was launched on December 25, 2021.\n- JWST's primary mirror is 6.5 meters in diameter, compared to Hubble's 2.4-meter mirror.\n- JWST observes primarily in the infrared spectrum, allowing it to see through cosmic dust.\n- In 2022, JWST captured the deepest infrared image of the universe ever produced.\nThe student wants to emphasize JWST's technological superiority over its predecessor. Which choice most effectively uses relevant information from the notes to accomplish this goal?",options:["A) Launched on December 25, 2021, the James Webb Space Telescope orbits the Sun at a distance of 1.5 million kilometers from Earth.","B) With a primary mirror nearly three times larger than Hubble's and the ability to observe in the infrared spectrum, JWST represents a significant advance over its predecessor.","C) In 2022, JWST captured the deepest infrared image of the universe ever produced.","D) JWST observes primarily in the infrared spectrum, which allows it to see through cosmic dust."],answer:"B",explanation:"Hedef: Hubble'a göre üstünlük. B, ayna boyutu karşılaştırması + kızılötesi yeteneği.",rule:"Rhetorical Synthesis: Hedefe en uygun sentez cümlesi",difficulty:"orta"},{id:5005,topicId:16,passage:"While researching the history of coffee, a student has taken the following notes:\n- Coffee was first cultivated in Ethiopia around the 9th century.\n- By the 15th century, coffee had spread to the Arabian Peninsula.\n- The first European coffeehouse opened in Venice in 1629.\n- Coffee is now the second most traded commodity after crude oil.\nThe student wants to trace the geographic spread of coffee over time. Which choice most effectively uses relevant information from the notes to accomplish this goal?",options:["A) Brazil currently accounts for about one-third of global coffee production, making it the world's largest producer.","B) First cultivated in Ethiopia around the 9th century, coffee had spread to the Arabian Peninsula by the 15th century and reached Europe when Venice opened its first coffeehouse in 1629.","C) Coffee, which was first cultivated in Ethiopia, is now the second most traded commodity after crude oil.","D) The first European coffeehouse opened in Venice in 1629, reflecting the growing popularity of coffee."],answer:"B",explanation:"Hedef: coğrafi yayılımı zaman içinde izle. B, Etiyopya → Arap Y. → Avrupa kronolojik.",rule:"Rhetorical Synthesis: Hedefe en uygun sentez cümlesi",difficulty:"orta"},{id:5006,topicId:16,passage:"While researching Arctic terns, a student has taken the following notes:\n- Arctic terns migrate from the Arctic to the Antarctic and back each year.\n- Their annual round-trip covers approximately 44,000 miles.\n- This is the longest known migration of any animal.\n- Arctic terns can live for over 30 years.\n- Over a lifetime, an Arctic tern may travel the equivalent of three round trips to the Moon.\nThe student wants to convey the extraordinary scale of the Arctic tern's lifetime migration. Which choice most effectively uses relevant information from the notes to accomplish this goal?",options:["A) Arctic terns migrate annually from the Arctic to the Antarctic, covering about 44,000 miles in a round trip.","B) The Arctic tern, which can live for over 30 years, makes the longest known annual migration of any animal.","C) With an annual migration of approximately 44,000 miles and a lifespan exceeding 30 years, an Arctic tern may travel the equivalent of three round trips to the Moon over its lifetime.","D) Arctic terns travel between the Arctic and Antarctic each year, making the longest migration of any species."],answer:"C",explanation:"Hedef: yaşam boyu göçün olağanüstü boyutu. C, yıllık mesafe + ömür + Ay karşılaştırması.",rule:"Rhetorical Synthesis: Hedefe en uygun sentez cümlesi",difficulty:"zor"},{id:5007,topicId:16,passage:"While researching the Dead Sea, a student has taken the following notes:\n- The Dead Sea is located between Jordan and Israel.\n- Its surface is approximately 430 meters below sea level, the lowest point on Earth.\n- The water's salinity is approximately 34%, nearly ten times saltier than the ocean.\n- The Dead Sea has been shrinking at approximately one meter per year due to water diversion.\nThe student wants to introduce the Dead Sea to an audience unfamiliar with it. Which choice most effectively uses relevant information from the notes to accomplish this goal?",options:["A) Located between Jordan and Israel, the Dead Sea sits approximately 430 meters below sea level and contains water nearly ten times saltier than the ocean.","B) The Dead Sea has been shrinking at approximately one meter per year because water is being diverted from the Jordan River.","C) The Dead Sea's extreme salinity, approximately 34%, allows swimmers to float effortlessly on its surface.","D) At 430 meters below sea level, the Dead Sea is the lowest point on Earth and has been shrinking due to water diversion."],answer:"A",explanation:"Hedef: tanımayan birine tanıtım. A, konum + yükseklik + tuzluluk = genel tanıtım.",rule:"Rhetorical Synthesis: Hedefe en uygun sentez cümlesi",difficulty:"orta"},{id:5008,topicId:16,passage:"While researching Marie Curie, a student has taken the following notes:\n- In 1903, she became the first woman to win a Nobel Prize (in Physics).\n- In 1911, she won a second Nobel Prize in Chemistry for discovering radium and polonium.\n- She remains the only person to have won Nobel Prizes in two different sciences.\nThe student wants to emphasize Marie Curie's unprecedented scientific achievements. Which choice most effectively uses relevant information from the notes to accomplish this goal?",options:["A) Born in Warsaw in 1867, Marie Curie moved to Paris in 1891, where she studied at the Sorbonne.","B) Marie Curie won the Nobel Prize in Physics in 1903 and the Nobel Prize in Chemistry in 1911, making her the only person in history to win Nobel Prizes in two different scientific disciplines.","C) Marie Curie's discovery of radium and polonium earned her the Nobel Prize in Chemistry in 1911.","D) In 1903, Marie Curie shared the Nobel Prize in Physics with her husband Pierre Curie and Henri Becquerel."],answer:"B",explanation:"Hedef: emsalsiz başarıları vurgula. B, iki Nobel + 'tek kişi' kaydı.",rule:"Rhetorical Synthesis: Hedefe en uygun sentez cümlesi",difficulty:"kolay"},{id:5009,topicId:16,passage:"While researching deforestation in the Amazon, a student has taken the following notes:\n- The Amazon produces approximately 20% of the world's oxygen.\n- Between 2001 and 2020, the Amazon lost approximately 8% of its forest cover.\n- Deforestation releases stored carbon into the atmosphere.\n- Indigenous communities depend on the forest for food, medicine, and cultural practices.\nThe student wants to argue that deforestation has global consequences. Which choice most effectively uses relevant information from the notes to accomplish this goal?",options:["A) Indigenous communities in the Amazon depend on the forest for food, medicine, and cultural practices.","B) The Amazon is home to approximately 10% of all known species, and between 2001 and 2020, it lost about 8% of its forest cover.","C) Because the Amazon produces roughly 20% of the world's oxygen and its deforestation releases stored carbon, the loss of Amazonian forest has consequences that extend far beyond the region.","D) Between 2001 and 2020, the Amazon lost approximately 8% of its forest cover, threatening indigenous communities."],answer:"C",explanation:"Hedef: küresel sonuçlar. C, oksijen + karbon = küresel etki.",rule:"Rhetorical Synthesis: Hedefe en uygun sentez cümlesi",difficulty:"zor"},{id:5010,topicId:16,passage:"While researching Frida Kahlo, a student has taken the following notes:\n- At age 18, she was severely injured in a bus accident that caused lifelong pain.\n- She began painting during her recovery from the accident.\n- Many of her paintings are self-portraits that explore themes of identity, pain, and the human body.\n- Her work is celebrated for vivid colors and incorporation of Mexican folk art traditions.\nThe student wants to show the connection between Kahlo's personal experiences and her art. Which choice most effectively uses relevant information from the notes to accomplish this goal?",options:["A) Born in Mexico in 1907, Frida Kahlo is celebrated for paintings that feature vivid colors and incorporate Mexican folk art traditions.","B) After being severely injured in a bus accident at age 18, Kahlo began painting during her recovery and went on to create self-portraits that explored the themes of pain and identity that defined her lived experience.","C) Frida Kahlo's self-portraits are known for their vivid colors and incorporation of Mexican folk art traditions.","D) Frida Kahlo was severely injured in a bus accident at age 18, an event that caused her lifelong pain."],answer:"B",explanation:"Hedef: kişisel deneyim-sanat bağlantısı. B, kaza → resim → otoportreler acı/kimlik.",rule:"Rhetorical Synthesis: Hedefe en uygun sentez cümlesi",difficulty:"zor"},{id:5011,topicId:16,passage:"While researching the octopus, a student has taken the following notes:\n- Octopuses are considered among the most intelligent invertebrates.\n- An octopus can change its color, texture, and shape to blend in with surroundings.\n- Octopuses have been observed using coconut shells as portable shelters (tool use).\n- The average lifespan of most octopus species is only one to two years.\nThe student wants to emphasize the intelligence of the octopus. Which choice most effectively uses relevant information from the notes to accomplish this goal?",options:["A) With three hearts and blue blood, octopuses are among the most biologically distinctive creatures in the ocean.","B) Despite an average lifespan of only one to two years, octopuses demonstrate remarkable intelligence: they can camouflage themselves and have been observed using coconut shells as tools.","C) Octopuses have an average lifespan of one to two years and possess three hearts that pump blue blood.","D) Octopuses can change their appearance to blend in with surroundings, helping them avoid predators."],answer:"B",explanation:"Hedef: zekayı vurgula. B, kamufle + alet kullanımı = zeka kanıtları.",rule:"Rhetorical Synthesis: Hedefe en uygun sentez cümlesi",difficulty:"zor"},{id:5012,topicId:16,passage:"While researching the Rosetta Stone, a student has taken the following notes:\n- The Rosetta Stone was discovered in 1799 by French soldiers in Egypt.\n- It contains the same text in three scripts: Greek, Demotic, and hieroglyphics.\n- Before its discovery, scholars had been unable to decipher Egyptian hieroglyphics.\n- Jean-Francois Champollion used the Greek text to decode the hieroglyphics in 1822.\nThe student wants to explain why the Rosetta Stone was significant for understanding ancient Egypt. Which choice most effectively uses relevant information from the notes to accomplish this goal?",options:["A) Discovered in 1799 by French soldiers, the Rosetta Stone is currently housed in the British Museum.","B) The Rosetta Stone contains the same text in Greek, Demotic, and hieroglyphics, and it was found in Egypt in 1799.","C) The Rosetta Stone proved crucial because its Greek text enabled Champollion to decode Egyptian hieroglyphics in 1822, ending centuries of scholarly inability to read them.","D) Champollion used the Greek text on the Rosetta Stone to decode hieroglyphics, and the stone is now in the British Museum."],answer:"C",explanation:"Hedef: antik Mısır için neden önemli. C, çözülemeyen hiyeroglif + çözüldü.",rule:"Rhetorical Synthesis: Hedefe en uygun sentez cümlesi",difficulty:"orta"},{id:5013,topicId:16,passage:"While researching the Viking Age, a student has taken the following notes:\n- Vikings are often portrayed as violent raiders, but they were also skilled traders and explorers.\n- Leif Eriksson reached North America around 1000 CE, nearly 500 years before Columbus.\n- Viking longships could navigate both open oceans and shallow rivers.\nThe student wants to challenge a common misconception about Vikings. Which choice most effectively uses relevant information from the notes to accomplish this goal?",options:["A) The Viking Age lasted from approximately 793 to 1066 CE and originated in Scandinavia.","B) Although Vikings are often portrayed as violent raiders, they were also accomplished traders and explorers — Leif Eriksson reached North America around 1000 CE, nearly five centuries before Columbus.","C) Viking longships could navigate both open oceans and shallow rivers, making them effective tools for raiding.","D) Leif Eriksson reached North America around 1000 CE, sailing from Scandinavia in a Viking longship."],answer:"B",explanation:"Hedef: yaygın yanılgıyı çürüt. B, 'şiddet' algısını ele alıp tüccar/kaşif yönünü gösterir.",rule:"Rhetorical Synthesis: Hedefe en uygun sentez cümlesi",difficulty:"zor"},{id:5014,topicId:16,passage:"While researching sleep, a student has taken the following notes:\n- Chronic sleep deprivation increases the risk of heart disease, obesity, and diabetes.\n- A 2019 study found that 35% of American adults regularly get fewer than 7 hours of sleep.\n- Blue light from electronic devices can suppress melatonin production.\nThe student wants to emphasize the health risks of insufficient sleep. Which choice most effectively uses relevant information from the notes to accomplish this goal?",options:["A) Blue light from electronic devices suppresses melatonin production, which can reduce overall sleep quality.","B) During sleep, the brain performs critical functions such as consolidating memories.","C) A 2019 study found that 35% of American adults regularly sleep fewer than 7 hours, a pattern that increases their risk of heart disease, obesity, and diabetes.","D) Adults need between 7 and 9 hours of sleep per night for optimal health."],answer:"C",explanation:"Hedef: yetersiz uykunun sağlık riskleri. C, istatistik + hastalık riskleri.",rule:"Rhetorical Synthesis: Hedefe en uygun sentez cümlesi",difficulty:"orta"},{id:5015,topicId:16,passage:"While researching coral reefs, a student has taken the following notes:\n- A 2020 study found that 14% of the world's coral was lost between 2009 and 2018.\n- Coral bleaching occurs when rising temperatures cause corals to expel symbiotic algae.\n- Some researchers are experimenting with 'assisted evolution,' breeding heat-resistant strains.\nThe student wants to present both a problem and a potential solution. Which choice most effectively uses relevant information from the notes to accomplish this goal?",options:["A) Coral reefs cover less than 1% of the ocean floor but support approximately 25% of all marine species.","B) Rising water temperatures cause coral bleaching, contributing to a 14% loss of coral between 2009 and 2018.","C) With 14% of the world's coral lost between 2009 and 2018 due to rising temperatures, researchers are now pursuing 'assisted evolution' — breeding heat-resista
