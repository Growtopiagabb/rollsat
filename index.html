nt strains — as a potential solution.","D) Some researchers are experimenting with assisted evolution, breeding heat-resistant coral strains."],answer:"C",explanation:"Hedef: sorun + çözüm. C, kayıp (sorun) + destekli evrim (çözüm).",rule:"Rhetorical Synthesis: Hedefe en uygun sentez cümlesi",difficulty:"zor"},{id:5016,topicId:16,passage:"While researching the Silk Road, a student has taken the following notes:\n- The Silk Road was a network of trade routes connecting China to the Mediterranean.\n- Goods traded included silk, spices, precious metals, and glassware.\n- The routes also facilitated the exchange of ideas, religions, and technologies.\n- The spread of the Black Death in the 14th century has been linked to Silk Road trade.\nThe student wants to argue that the Silk Road's impact extended beyond commerce. Which choice most effectively uses relevant information from the notes to accomplish this goal?",options:["A) Active for over 1,500 years, the Silk Road connected China to the Mediterranean.","B) Goods traded along the Silk Road included silk, spices, precious metals, and glassware.","C) Beyond facilitating trade of goods, the Silk Road served as a conduit for the exchange of religions, technologies, and even diseases — the 14th-century spread of the Black Death has been linked to these routes.","D) The spread of the Black Death has been linked to trade along the Silk Road, which was active for over 1,500 years."],answer:"C",explanation:"Hedef: ticaretin ötesinde etki. C, ticaret + din/teknoloji + veba = ticaret ötesi.",rule:"Rhetorical Synthesis: Hedefe en uygun sentez cümlesi",difficulty:"zor"},{id:6001,topicId:17,passage:"The novelist's prose is notably ___; her sentences are spare and unadorned, conveying complex emotions through the simplest of language.",options:["A) austere","B) florid","C) whimsical","D) ambiguous"],answer:"A",explanation:"Sade, süssüz (spare, unadorned) → austere (sade, yalın). Florid = süslü (zıt). Whimsical = kaprisli. Ambiguous = belirsiz.",rule:"Bağlamdan ipucu: 'spare and unadorned' → austere",difficulty:"orta"},{id:6002,topicId:17,passage:"Although the diplomat's public statements were carefully measured, her private correspondence revealed a far more ___ assessment of the negotiations, expressing deep frustration with the lack of progress.",options:["A) diplomatic","B) candid","C) reserved","D) indifferent"],answer:"B",explanation:"Kamusal = ölçülü → özel = daha açık sözlü + derin hayal kırıklığı. Candid = açık sözlü.",rule:"Kontrast ipucu: 'Although...measured' → 'far more ___' = zıt → candid",difficulty:"zor"},{id:6003,topicId:17,passage:"The researcher's findings were so ___ that they prompted an immediate reexamination of long-held assumptions about the origins of the disease.",options:["A) predictable","B) inconsequential","C) startling","D) ambivalent"],answer:"C",explanation:"Uzun süredir kabul edilen varsayımların yeniden incelenmesine yol açtı → şaşırtıcı. Startling = şaşırtıcı.",rule:"Sonuç ipucu: 'prompted reexamination of long-held assumptions' → startling",difficulty:"orta"},{id:6004,topicId:17,passage:"The committee's report, rather than offering a ___ endorsement of the proposal, highlighted several areas of concern that required further investigation.",options:["A) lukewarm","B) unequivocal","C) tentative","D) superficial"],answer:"B",explanation:"'rather than' + endişeleri vurguladı = TAM bir onay VERMEDİ. Unequivocal = kesin, tartışmasız.",rule:"Kontrast: 'rather than ___ endorsement' + 'areas of concern' → unequivocal (kesin onay vermedi)",difficulty:"zor"},{id:6005,topicId:17,passage:"The artist's early work was largely ___; it closely imitated the techniques and subjects favored by the Impressionists without adding any distinctive personal vision.",options:["A) derivative","B) innovative","C) provocative","D) abstract"],answer:"A",explanation:"Taklitçi (imitated) + kişisel vizyon yok → derivative (türetilmiş, özgün olmayan).",rule:"Tanım ipucu: 'imitated...without distinctive personal vision' → derivative",difficulty:"orta"},{id:6006,topicId:17,passage:"The new evidence did not ___ the defendant; rather, it deepened suspicions about her involvement in the scheme.",options:["A) implicate","B) exonerate","C) condemn","D) identify"],answer:"B",explanation:"'did not ___' + aksine şüpheleri derinleştirdi → aklama yapmadı. Exonerate = aklamak.",rule:"Kontrast: 'did not ___; rather, deepened suspicions' → exonerate",difficulty:"orta"},{id:6007,topicId:17,passage:"The professor's lectures, though intellectually rigorous, were far from dry; her vivid anecdotes and sharp wit made even the most ___ topics engaging.",options:["A) compelling","B) accessible","C) arcane","D) controversial"],answer:"C",explanation:"Anekdotlar ve zekası EN ___ konuları bile ilginç yaptı. Arcane = anlaşılması güç, ezoterik.",rule:"Kontrast: 'even the most ___ topics engaging' → en zor/karanlık konular → arcane",difficulty:"zor"},{id:6008,topicId:17,passage:"Despite the governor's attempt to ___ public anger over the tax increase, protests continued to grow in both size and intensity.",options:["A) exacerbate","B) validate","C) assuage","D) disregard"],answer:"C",explanation:"Protestolar büyümeye devam etti → yatıştırma GİRİŞİMİ başarısız. Assuage = yatıştırmak.",rule:"'Despite attempt to ___' + protestolar devam etti → assuage (yatıştırma girişimi)",difficulty:"zor"},{id:6009,topicId:17,passage:"The historical account was remarkably ___, presenting events from multiple perspectives without favoring any particular interpretation.",options:["A) biased","B) comprehensive","C) impartial","D) superficial"],answer:"C",explanation:"Birden fazla perspektif + belirli bir yorumu desteklemeden → impartial (tarafsız).",rule:"Tanım: 'multiple perspectives without favoring' → impartial",difficulty:"kolay"},{id:6010,topicId:17,passage:"The once-___ neighborhood has been transformed by decades of investment; abandoned buildings have given way to thriving businesses and well-maintained parks.",options:["A) prosperous","B) dilapidated","C) prestigious","D) secluded"],answer:"B",explanation:"'once-___' + dönüştürüldü + terk edilmiş binalar → eskiden harap. Dilapidated = harap, bakımsız.",rule:"Zaman kontrastı: 'once-___' → 'transformed' + 'abandoned buildings' → dilapidated",difficulty:"orta"},{id:6011,topicId:17,passage:"The CEO's decision to expand into foreign markets was widely regarded as ___; within two years, international revenues accounted for nearly half of the company's total income.",options:["A) reckless","B) premature","C) astute","D) controversial"],answer:"C",explanation:"Uluslararası gelirler toplam gelirin yarısını oluşturdu → zekice karar. Astute = zeki, kurnaz.",rule:"Sonuç ipucu: başarılı sonuç → astute (akıllıca)",difficulty:"orta"},{id:6012,topicId:17,passage:"The author's argument, while superficially persuasive, ultimately rests on a ___ foundation; several of its key premises are unsupported by evidence.",options:["A) robust","B) tenuous","C) transparent","D) novel"],answer:"B",explanation:"Yüzeyde ikna edici ama kanıtlanmamış öncüller → zayıf temel. Tenuous = zayıf, çürük.",rule:"Kontrast: 'superficially persuasive' ama 'unsupported premises' → tenuous",difficulty:"zor"},{id:6013,topicId:17,passage:"In her speech, the activist did not merely describe the injustices she had witnessed; she spoke with a ___ that moved even her most skeptical listeners to action.",options:["A) monotony","B) detachment","C) fervor","D) hesitancy"],answer:"C",explanation:"En şüpheci dinleyicileri bile harekete geçirdi → tutkuyla konuştu. Fervor = şiddetli tutku.",rule:"Sonuç: 'moved skeptical listeners to action' → fervor",difficulty:"orta"},{id:6014,topicId:17,passage:"The treaty was designed to ___ tensions between the two nations, but its ambiguous language only created new sources of disagreement.",options:["A) intensify","B) exploit","C) alleviate","D) document"],answer:"C",explanation:"Belirsiz dil yeni anlaşmazlıklar yarattı → gerilimleri AZALTMAK amaçlanmıştı. Alleviate = hafifletmek.",rule:"Amaç vs sonuç: 'designed to ___' ama başarısız → alleviate",difficulty:"orta"},{id:6015,topicId:17,passage:"The study's conclusions are necessarily ___; the researchers themselves acknowledge that a larger sample size would be needed to confirm the findings.",options:["A) definitive","B) tentative","C) groundbreaking","D) irrelevant"],answer:"B",explanation:"Araştırmacılar daha büyük örneklem gerektiğini kabul ediyor → sonuçlar geçici. Tentative = kesin olmayan.",rule:"Kanıt: 'larger sample needed to confirm' → tentative",difficulty:"kolay"},{id:6016,topicId:17,passage:"Far from being a ___ account of the war, the memoir is unflinchingly honest about the author's own moral failures during the conflict.",options:["A) harrowing","B) sanitized","C) comprehensive","D) fictional"],answer:"B",explanation:"Ahlaki başarısızlıkları cesurca anlatıyor → 'far from ___' = sterilize EDİLMEMİŞ. Sanitized = temizlenmiş, yumuşatılmış.",rule:"'Far from being ___' + 'unflinchingly honest about failures' → sanitized",difficulty:"zor"},{id:6017,topicId:17,passage:"The philosopher's writing is deliberately ___; she avoids jargon and technical terminology, making her ideas accessible to readers without a background in philosophy.",options:["A) abstruse","B) polemical","C) lucid","D) verbose"],answer:"C",explanation:"Jargondan kaçınıyor + erişilebilir → anlaşılır. Lucid = açık, anlaşılır.",rule:"Tanım: 'avoids jargon, accessible' → lucid",difficulty:"kolay"},{id:6018,topicId:17,passage:"The critic described the film as ___: visually stunning but emotionally hollow, offering spectacle without substance.",options:["A) riveting","B) pedestrian","C) gratuitous","D) superficial"],answer:"D",explanation:"Görsel olarak etkileyici AMA duygusal olarak boş = yüzeysel. Superficial.",rule:"Tanım: 'visually stunning but emotionally hollow, spectacle without substance' → superficial",difficulty:"orta"},{id:6019,topicId:17,passage:"The negotiations had reached an ___: neither side was willing to make concessions, and further discussion seemed pointless.",options:["A) accord","B) impasse","C) apex","D) epiphany"],answer:"B",explanation:"Hiçbir taraf taviz vermiyor + tartışma anlamsız → çıkmaz. Impasse = çıkmaz.",rule:"Tanım: 'neither willing to concede, discussion pointless' → impasse",difficulty:"kolay"},{id:6020,topicId:17,passage:"The scientist's hypothesis, once dismissed as ___, has gained considerable support as new evidence has emerged.",options:["A) plausible","B) orthodox","C) fanciful","D) prescient"],answer:"C",explanation:"Eskiden reddedilmiş → şimdi destek kazanmış. Fanciful = hayali, gerçekçi olmayan.",rule:"Zaman kontrastı: 'once dismissed as ___' → 'gained support' → fanciful (eskiden gerçekçi bulunmamış)",difficulty:"zor"},{id:6021,topicId:17,passage:"The author's tone throughout the essay is best described as ___, combining sharp criticism of institutional failures with genuine empathy for the individuals affected by them.",options:["A) dismissive","B) sardonic","C) measured","D) indifferent"],answer:"C",explanation:"Keskin eleştiri + gerçek empati = dengelenmiş, ölçülü. Measured = dengeli, ölçülü.",rule:"Denge: 'sharp criticism' + 'genuine empathy' → measured (ikisini dengeliyor)",difficulty:"zor"},{id:6022,topicId:18,passage:"The following text is from a 2023 article in a scientific journal.\n\n\"For decades, the prevailing model of memory formation held that long-term memories are consolidated during sleep through a process of neural replay. Recent research, however, has challenged this view. A 2022 study demonstrated that certain types of procedural memories can be consolidated during waking rest periods, suggesting that the relationship between sleep and memory is more nuanced than previously understood.\"\n\nWhich choice best describes the overall structure of the text?",options:["A) It presents a traditional view, then introduces evidence that complicates that view.","B) It describes a study's methodology and then evaluates its conclusions.","C) It contrasts two competing theories and argues in favor of one.","D) It summarizes a finding and then explains its practical applications."],answer:"A",explanation:"Geleneksel görüş (uyku-hafıza) → sonra bunu karmaşıklaştıran kanıt. A = doğru yapı.",rule:"Yapı: eski görüş → 'however' → yeni kanıt = A",difficulty:"orta"},{id:6023,topicId:18,passage:"The following text is adapted from a literary critic's review.\n\n\"Morrison's prose in Beloved operates on multiple levels simultaneously. On the surface, it tells the story of Sethe and her family. Beneath that narrative, however, Morrison embeds a meditation on the nature of memory itself — how it haunts, distorts, and ultimately shapes identity. The novel's fragmented chronology is not a stylistic affectation but a structural embodiment of trauma's disruption of linear time.\"\n\nWhat is the main purpose of the text?",options:["A) To summarize the plot of Morrison's novel Beloved.","B) To argue that Morrison's narrative technique serves a thematic purpose.","C) To compare Morrison's writing style with that of other novelists.","D) To criticize the fragmented structure of Morrison's novel."],answer:"B",explanation:"Eleştirmen, parçalı kronolojinin 'stilistik bir gösteriş değil, travmanın yapısal somutlaşması' olduğunu savunuyor → teknik = tematik amaca hizmet ediyor.",rule:"Amaç: 'not affectation but structural embodiment' → teknik = tema",difficulty:"zor"},{id:6024,topicId:18,passage:"The following text is from a 2024 environmental policy report.\n\n\"Global deforestation rates declined by 6.3% between 2020 and 2023, according to satellite data analyzed by the University of Maryland. While environmental groups have cautiously welcomed the trend, several researchers have urged restraint, noting that the decline may reflect temporary economic slowdowns rather than lasting policy changes.\"\n\nWhat is the main purpose of the text?",options:["A) To celebrate a significant environmental achievement.","B) To present a finding while noting uncertainty about its cause.","C) To argue that economic policies are more effective than environmental regulations.","D) To criticize environmental groups for being overly cautious."],answer:"B",explanation:"Bulgu sunuyor (%6.3 düşüş) + ama nedenine dair belirsizlik notu. B.",rule:"Amaç: bulgu + 'may reflect...rather than' = belirsizlik",difficulty:"orta"},{id:6025,topicId:18,passage:"The following text is from a museum exhibit description.\n\n\"The ceramic vessels displayed in this gallery were recovered from a Bronze Age settlement in what is now southeastern Turkey. While their precise function remains debated, the intricate geometric patterns adorning their surfaces suggest that they held cultural or ceremonial significance beyond mere practical utility.\"\n\nWhich choice best describes the function of the second sentence?",options:["A) It provides historical context for the artifacts described in the first sentence.","B) It acknowledges uncertainty about the artifacts while offering an interpretive claim.","C) It contradicts the claim made in the first sentence about the artifacts' origins.","D) It describes the physical characteristics of the artifacts without interpretation."],answer:"B",explanation:"İkinci cümle: 'remains debated' (belirsizlik) + 'suggest...significance' (yorumlayıcı iddia). B.",rule:"İkinci cümle fonksiyonu: belirsizlik + yorum",difficulty:"orta"},{id:6026,topicId:18,passage:"The following text is from a 2023 economics article.\n\n\"Conventional wisdom holds that raising the minimum wage leads to job losses, particularly in industries that rely on low-wage labor. However, a growing body of empirical research has complicated this narrative. Studies conducted in states that implemented substantial minimum wage increases between 2015 and 2022 found no statistically significant decline in employment — and, in some cases, found modest increases in consumer spending.\"\n\nWhich choice best describes the overall structure of the text?",options:["A) It presents a hypothesis, tests it with data, and confirms it.","B) It introduces a widely held belief, then presents research that challenges it.","C) It describes two opposing theories and remains neutral between them.","D) It proposes a new economic model and defends it against criticism."],answer:"B",explanation:"Geleneksel görüş → 'However' → araştırma bunu karmaşıklaştırıyor = B.",rule:"Yapı: geleneksel inanç → 'However' + araştırma → challenge",difficulty:"orta"},{id:6027,topicId:18,passage:"The following text is from a biography of physicist Richard Feynman.\n\n\"Feynman's approach to teaching was inseparable from his approach to research. He believed that if he could not explain a concept in terms a first-year student could understand, then he did not truly understand it himself. This conviction produced not only some of the most celebrated lectures in the history of physics but also drove Feynman to continually re-examine and refine his own understanding of fundamental principles.\"\n\nWhat is the main purpose of the text?",options:["A) To describe how Feynman's teaching philosophy influenced both his lectures and his research.","B) To argue that Feynman was a better teacher than researcher.","C) To compare Feynman's teaching methods with those of other physicists.","D) To explain why Feynman's lectures became famous."],answer:"A",explanation:"Öğretme felsefesi → hem dersleri hem araştırmayı etkiledi. A en kapsamlı.",rule:"Amaç: öğretme felsefesi + sonuçları (dersler + araştırma)",difficulty:"orta"},{id:6028,topicId:18,passage:"The following text is from a literary analysis.\n\n\"At first glance, the poem appears to be a straightforward celebration of the natural landscape. A closer reading, however, reveals layers of irony: the pastoral imagery is consistently undercut by references to industrial encroachment, and the speaker's tone shifts subtly from admiration to elegy as the poem progresses.\"\n\nWhat is the main purpose of the text?",options:["A) To argue that the poem's apparent simplicity conceals a more complex meaning.","B) To praise the poet's skillful use of pastoral imagery.","C) To compare the poem with other works in the pastoral tradition.","D) To explain the historical context in which the poem was written."],answer:"A",explanation:"'At first glance' basit → 'closer reading' ironi katmanları = görünen basitlik karmaşık anlamı gizliyor. A.",rule:"Yapı: yüzeysel okuma vs derin okuma → gizli karmaşıklık",difficulty:"zor"},{id:6029,topicId:18,passage:"The following text discusses the work of primatologist Jane Goodall.\n\n\"When Goodall first reported that chimpanzees fashioned tools from twigs to extract termites from mounds, the scientific community was skeptical. Tool use had long been considered a uniquely human trait, and Goodall — who lacked a doctoral degree at the time — was dismissed by some as an untrained amateur. Subsequent decades of observation, however, have vindicated her findings, and tool use has since been documented in dozens of animal species.\"\n\nWhich choice best describes the function of the last sentence?",options:["A) It introduces a new finding that contradicts Goodall's original research.","B) It explains why the scientific community was initially skeptical of Goodall.","C) It demonstrates that Goodall's controversial findings were ultimately confirmed and extended.","D) It argues that Goodall deserved more recognition than she received."],answer:"C",explanation:"Son cümle: 'vindicated her findings' + 'documented in dozens of species' = doğrulandı ve genişletildi. C.",rule:"Son cümle fonksiyonu: doğrulama + genişletme",difficulty:"orta"},{id:6030,topicId:19,passage:"Text 1:\n\"Social media platforms have democratized public discourse by giving ordinary citizens a powerful means of sharing information, organizing collective action, and holding institutions accountable.\"\n\nText 2:\n\"The proliferation of social media has fragmented public discourse into ideological echo chambers, where misinformation spreads unchecked and substantive debate is replaced by performative outrage.\"\n\nBased on the texts, how would the author of Text 2 most likely respond to the claim in Text 1?",options:["A) By agreeing that social media has democratized discourse but noting that this process has had significant negative consequences.","B) By arguing that social media has had no meaningful effect on public discourse.","C) By suggesting that the benefits described in Text 1 are available only to wealthy users.","D) By dismissing the claim in Text 1 as entirely false without qualification."],answer:"A",explanation:"Text 2 olumsuz sonuçları vurgular ama demokratikleşmeyi tamamen reddetmez → A: katılır ama olumsuz sonuçları not eder.",rule:"Çapraz metin: Text 2 Text 1'i tamamen reddetmez, nüansla yanıt verir",difficulty:"zor"},{id:6031,topicId:19,passage:"Text 1:\n\"The most effective way to reduce carbon emissions is through market-based mechanisms such as carbon pricing. By putting a cost on emissions, these policies create economic incentives for businesses to invest in cleaner technologies.\"\n\nText 2:\n\"While carbon pricing can play a role in reducing emissions, it is insufficient on its own. Without direct government investment in renewable energy infrastructure and strict regulatory standards, market mechanisms alone will not drive the rapid decarbonization that the climate crisis demands.\"\n\nWhich choice best describes the relationship between the two texts?",options:["A) Text 2 fundamentally contradicts the central claim of Text 1.","B) Text 2 accepts the premise of Text 1 but argues that additional measures are necessary.","C) Text 2 provides evidence that supports the argument made in Text 1.","D) Text 2 addresses a different aspect of climate policy than Text 1."],answer:"B",explanation:"Text 2: 'can play a role' (kabul) + 'insufficient on its own' (ek önlemler gerekli) = B.",rule:"İlişki: kısmi kabul + yetersizlik argümanı",difficulty:"orta"},{id:6032,topicId:19,passage:"Text 1:\n\"Early childhood education programs that emphasize structured, teacher-directed learning have been shown to produce measurable gains in literacy and numeracy among disadvantaged children.\"\n\nText 2:\n\"Research in developmental psychology suggests that play-based learning, in which children direct their own exploration, is more effective than structured instruction at fostering the creativity, problem-solving skills, and intrinsic motivation that are critical for long-term academic success.\"\n\nBased on the texts, both authors would most likely agree with which of the following statements?",options:["A) Early childhood education should prioritize structured instruction over play-based approaches.","B) Early childhood education has a significant impact on children's development.","C) Disadvantaged children benefit more from play-based learning than structured instruction.","D) The primary goal of early childhood education should be fostering creativity."],answer:"B",explanation:"Her iki metin de erken çocukluk eğitiminin önemli etkisi olduğu noktasında hemfikir — farklı yaklaşımları savunuyorlar.",rule:"Ortak zemin: her ikisi de erken eğitimin etkisini kabul ediyor",difficulty:"zor"},{id:6033,topicId:19,passage:"Text 1:\n\"The restoration of wolves to Yellowstone National Park in 1995 triggered a trophic cascade that fundamentally transformed the ecosystem. Elk populations declined, allowing overgrazed vegetation to recover, which in turn stabilized riverbanks and increased biodiversity.\"\n\nText 2:\n\"While the reintroduction of wolves to Yellowstone has been widely cited as a conservation success story, recent studies suggest that the ecological changes attributed to wolves may have been overstated. Drought conditions and other environmental factors likely contributed as much to vegetation recovery as predation pressure from wolves.\"\n\nHow does Text 2 relate to Text 1?",options:["A) It offers an alternative explanation for the ecological changes described in Text 1.","B) It provides additional evidence supporting the claims made in Text 1.","C) It argues that the wolf reintroduction was a failure.","D) It focuses on a different national park than the one discussed in Text 1."],answer:"A",explanation:"Text 2: kurtlara atfedilen değişiklikler abartılmış olabilir + kuraklık da etken → ALTERNATİF açıklama. A.",rule:"Alternatif açıklama: 'drought and other factors' vs 'wolves'",difficulty:"orta"},{id:6034,topicId:19,passage:"Text 1:\n\"Artificial intelligence systems are only as reliable as the data on which they are trained. If training data reflects historical biases — as it inevitably does — the resulting models will perpetuate and potentially amplify those biases.\"\n\nText 2:\n\"Advanced debiasing techniques, including adversarial training and counterfactual data augmentation, have shown promise in reducing the influence of biased training data on AI model outputs. While no method eliminates bias entirely, these approaches represent meaningful progress.\"\n\nBased on the texts, how would the author of Text 1 most likely respond to the claims in Text 2?",options:["A) By arguing that the debiasing techniques described are entirely ineffective.","B) By acknowledging the progress described while emphasizing that the fundamental problem of biased training data remains.","C) By agreeing that the bias problem has been effectively solved.","D) By dismissing the relevance of training data to AI model performance."],answer:"B",explanation:"Text 1 önyargının kaçınılmaz olduğunu vurgular → Text 2'nin ilerlemesini kabul edebilir ama temel sorunun devam ettiğini vurgular. B.",rule:"Nüanslı yanıt: ilerlemeyi kabul + temel sorunu vurgula",difficulty:"zor"},{id:6035,topicId:19,passage:"Text 1:\n\"Remote work has fundamentally altered the relationship between employers and employees. Workers now have unprecedented flexibility, and companies can recruit talent from anywhere in the world.\"\n\nText 2:\n\"The shift to remote work has eroded the informal social bonds that sustain workplace culture. Without spontaneous hallway conversations and shared physical spaces, employees report feeling isolated and disconnected from their colleagues and the organization's mission.\"\n\nWhich choice best describes the relationship between the two texts?",options:["A) They discuss the same phenomenon but emphasize different consequences of it.","B) Text 2 provides specific examples that support the general claims in Text 1.","C) They present findings from the same study but draw different conclusions.","D) Text 1 describes a cause, and Text 2 describes an unrelated effect."],answer:"A",explanation:"Her ikisi de uzaktan çalışmayı tartışıyor ama farklı sonuçlarını vurguluyor: Text 1 = esneklik (+), Text 2 = izolasyon (−). A.",rule:"Aynı olgu, farklı sonuçlar",difficulty:"orta"},{id:6036,topicId:20,passage:"The following text is from a 2024 article about urban agriculture.\n\n\"Community gardens in low-income neighborhoods do more than provide fresh produce. A longitudinal study conducted across twelve cities found that neighborhoods with active community gardens experienced a 15% reduction in reported crime, higher rates of civic participation, and stronger social cohesion among residents. The researchers concluded that the gardens function as catalysts for broader community development.\"\n\nWhich choice best states the main idea of the text?",options:["A) Community gardens are an effective way to grow fresh produce in urban areas.","B) Community gardens contribute to broader social benefits beyond food production.","C) Crime rates in low-income neighborhoods are declining due to new policing strategies.","D) Longitudinal studies are the most reliable method for measuring community development."],answer:"B",explanation:"Ana fikir: 'do more than produce' + suç azalması, sivil katılım, sosyal uyum = gıda üretiminin ötesinde faydalar. B.",rule:"Ana fikir: 'more than provide produce' → broader benefits",difficulty:"kolay"},{id:6037,topicId:20,passage:"The following text is from a science article about coral reefs.\n\n\"Marine biologists have long known that coral reefs support an extraordinary diversity of marine life. What has only recently become clear, however, is the extent to which reefs also protect coastal communities from the destructive force of storms and tsunamis. A 2023 meta-analysis estimated that coral reefs reduce wave energy by an average of 97%, preventing billions of dollars in property damage annually.\"\n\nWhich choice best states the main idea of the text?",options:["A) Coral reefs are home to a wide variety of marine species.","B) A recent study has revealed that coral reefs provide crucial coastal protection that was previously underappreciated.","C) Climate change is the primary threat to coral reef ecosystems worldwide.","D) Coral reefs reduce wave energy by 97%, according to a meta-analysis."],answer:"B",explanation:"Ana fikir: 'only recently became clear' + kıyı koruma = daha önce yeterince takdir edilmemiş kıyı koruma. B (D sadece istatistik, ana fikir değil).",rule:"Ana fikir: 'only recently clear' → yeni anlayış vurgusu",difficulty:"orta"},{id:6038,topicId:20,passage:"The following text discusses the work of mathematician Maryam Mirzakhani.\n\n\"Mirzakhani's work on the dynamics of Riemann surfaces earned her the Fields Medal in 2014 — the first woman to receive the honor. But what distinguished Mirzakhani was not merely her technical brilliance; it was her approach to mathematics. Colleagues described her as someone who thought in pictures, covering enormous sheets of paper with hand-drawn diagrams that mapped the geometric landscapes of her imagination before translating them into formal proofs.\"\n\nWhich choice best states the main idea of the text?",options:["A) Mirzakhani was the first woman to win the Fields Medal.","B) Mirzakhani's distinctive visual approach to mathematics set her apart as much as her technical achievements.","C) The Fields Medal is the most prestigious award in mathematics.","D) Riemann surfaces are a central topic in modern mathematics."],answer:"B",explanation:"'not merely technical brilliance' + görsel yaklaşım = onu teknik başarıları kadar ayıran şey yaklaşımı. B.",rule:"Ana fikir: 'not merely...it was her approach' → ayırt edici yaklaşım",difficulty:"orta"},{id:6039,topicId:20,passage:"The following text is from a psychology article.\n\n\"The 'marshmallow test,' a famous experiment in delayed gratification, has been widely cited as evidence that childhood self-control predicts long-term success. However, a 2018 replication study found that once researchers controlled for socioeconomic background, the correlation between childhood self-control and later outcomes was dramatically reduced. The findings suggest that what the original study actually measured was not willpower but the material security that enables patience.\"\n\nWhich choice best states the main idea of the text?",options:["A) The marshmallow test is a reliable predictor of long-term success in children.","B) A replication study suggests that the marshmallow test measured economic security rather than self-control.","C) Socioeconomic background has no effect on children's ability to delay gratification.","D) The 2018 study failed to replicate the original marshmallow test findings."],answer:"B",explanation:"'what the original study actually measured was not willpower but material security' = B.",rule:"Ana fikir: orijinal test iradesini değil ekonomik güvenliği ölçtü",difficulty:"zor"},{id:6040,topicId:20,passage:"The following text discusses monarch butterfly migration.\n\n\"Each autumn, millions of monarch butterflies travel up to 3,000 miles from Canada to central Mexico — a journey that takes multiple generations to complete. No individual butterfly makes the entire round trip; instead, successive generations navigate a route that none of them has traveled before. How monarchs accomplish this feat of inherited navigation remains one of the most compelling mysteries in biology.\"\n\nAccording to the text, what makes monarch migration particularly remarkable?",options:["A) The total distance covered during the migration.","B) The fact that individual butterflies navigate a route they have never previously traveled.","C) The number of butterflies that participate in the migration each year.","D) The speed at which monarch butterflies can travel."],answer:"B",explanation:"'No individual makes the entire trip' + 'navigate a route none has traveled before' = hiç gitmediği bir rotayı yönlendirmesi. B.",rule:"Spesifik detay: 'route that none has traveled before' → kalıtsal navigasyon",difficulty:"orta"},{id:6041,topicId:21,passage:"A literary critic argues that the novels of Kazuo Ishiguro are primarily concerned with the unreliability of memory and the stories people construct to make sense of their pasts.\n\nWhich finding, if true, would most directly support this claim?",options:["A) Ishiguro's novels are frequently assigned in university literature courses around the world.","B) In several of Ishiguro's novels, narrators gradually reveal that their initial accounts of past events were incomplete or self-serving.","C) Ishiguro has stated in interviews that he draws inspiration from Japanese and British literary traditions.","D) Ishiguro won the Nobel Prize in Literature in 2017."],answer:"B",explanation:"İddia: hafıza güvenilmezliği + geçmişi anlamlandırma hikayeleri. B: anlatıcılar geçmiş olayların hesabının eksik/çıkarcı olduğunu yavaşça ortaya koyuyor → doğrudan destekler.",rule:"Kanıt: anlatıcıların 'unreliable memory' sergilemesi → iddiayı destekler",difficulty:"orta"},{id:6042,topicId:21,passage:"A researcher hypothesizes that exposure to nature in childhood leads to stronger environmental attitudes in adulthood.\n\nWhich finding, if true, would most directly support this hypothesis?",options:["A) Adults who regularly visit national parks tend to have higher incomes than those who do not.","B) A longitudinal study found that adults who spent significant time in natural settings as children were more likely to support environmental conservation policies.","C) Environmental organizations have increased their outreach to children in recent years.","D) Children who live in rural areas perform better on standardized science tests."],answer:"B",explanation:"Hipotez: çocuklukta doğa → yetişkinlikte çevre tutumları. B: boylamsal çalışma, çocuklukta doğa deneyimi → yetişkinlikte koruma politikaları desteği.",rule:"Kanıt: boylamsal çalışma doğa-tutum bağını doğrudan gösteriyor",difficulty:"kolay"},{id:6043,topicId:21,passage:"An art historian argues that the Impressionists' revolutionary use of color was influenced less by aesthetic theory than by practical developments in paint technology — specifically, the invention of portable paint tubes in the 1840s, which allowed artists to work outdoors for extended periods.\n\nWhich finding, if true, would most directly support this argument?",options:["A) The Impressionists were generally well-read in contemporary aesthetic philosophy.","B) Portable paint tubes were widely available in France by the time the Impressionist movement emerged.","C) Before portable tubes became available, very few European artists painted outdoor scenes that employed the bright, varied color palettes characteristic of Impressionism.","D) Many Impressionist paintings now hang in the world's most prestigious museums."],answer:"C",explanation:"İddia: boya teknolojisi → renk devrimi. C: taşınabilir tüpler öncesinde açık hava resimlerinde parlak paletler nadir → teknoloji = neden.",rule:"Kanıt: teknoloji öncesi eksiklik → teknolojinin etkisini gösterir",difficulty:"zor"},{id:6044,topicId:21,passage:"A sociologist claims that gentrification, while often criticized for displacing low-income residents, also generates measurable improvements in public infrastructure and services in the affected neighborhoods.\n\nWhich finding, if true, would most directly weaken this claim?",options:["A) Gentrified neighborhoods often experience significant increases in property values.","B) A study found that infrastructure improvements in gentrified neighborhoods were funded primarily by state and federal programs unrelated to gentrification.","C) Long-term residents of gentrified neighborhoods sometimes benefit from improved services.","D) Gentrification has occurred in cities across the United States and Europe."],answer:"B",explanation:"İddia: soylulaştırma → altyapı iyileştirmeleri. B: iyileştirmeler soylulaştırmayla ilgisiz programlarla finanse edildi → soylulaştırma nedeni DEĞİL.",rule:"Zayıflatma: alternatif neden (devlet programları) → soylulaştırma ile bağ zayıflar",difficulty:"zor"},{id:6045,topicId:21,passage:"A paleontologist claims that the mass extinction event at the end of the Cretaceous period was caused primarily by the impact of a large asteroid, not by volcanic activity.\n\nWhich finding, if true, would most directly support this claim?",options:["A) Fossil records show that some dinosaur species were declining before the asteroid impact.","B) Analysis of geological layers from the extinction boundary reveals concentrations of iridium — an element rare on Earth but common in asteroids — at levels consistent with a massive impact event.","C) The Deccan Traps volcanic eruptions in India occurred around the same time as the extinction event.","D) Several mass extinction events in Earth's history have been linked to volcanic activity."],answer:"B",explanation:"İddia: asteroit etkisi (volkanik aktivite değil). B: iridyum konsantrasyonları asteroitle tutarlı → doğrudan kanıt.",rule:"Kanıt: iridyum = asteroit imzası → doğrudan destekler",difficulty:"orta"},{id:6046,topicId:21,passage:"A linguist argues that children acquire language not primarily through imitation but through an innate biological capacity for language learning.\n\nWhich finding, if true, would most directly support this argument?",options:["A) Children raised in bilingual households learn to speak both languages fluently.","B) Children in all cultures begin producing grammatically complex sentences at approximately the same age, regardless of the amount or quality of linguistic input they receive.","C) Parents who read to their children regularly tend to have children with larger vocabularies.","D) Some adults can learn new languages more quickly than others."],answer:"B",explanation:"İddia: doğuştan kapasite, taklit değil. B: tüm kültürlerde aynı yaşta karmaşık cümleler, girdi miktarından bağımsız → doğuştan kapasite kanıtı.",rule:"Kanıt: evrensel zamanlama + girdiden bağımsızlık → doğuştan kapasite",difficulty:"zor"},{id:6047,topicId:22,passage:"A researcher studying sleep patterns collected data on average nightly sleep duration and academic performance among college students. The data showed that students who slept 7-8 hours per night had an average GPA of 3.4, students who slept 5-6 hours had an average GPA of 2.9, and students who slept fewer than 5 hours had an average GPA of 2.3.\n\nWhich choice most effectively uses data from the study to support the claim that insufficient sleep is associated with lower academic performance?",options:["A) College students who slept fewer than 5 hours per night had an average GPA of 2.3, which is 1.1 points lower than the average GPA of students who slept 7-8 hours.","B) Some college students sleep fewer than 5 hours per night, which is below the recommended amount.","C) Students who slept 7-8 hours per night had the highest average GPA of 3.4.","D) The study collected data on sleep patterns among college students."],answer:"A",explanation:"İddia: yetersiz uyku → düşük akademik performans. A, en az uyuyanların GPA'sını en çok uyuyanlarla karşılaştırarak farkı gösterir (2.3 vs 3.4).",rule:"Nicel kanıt: spesifik karşılaştırma → iddiayı doğrudan destekler",difficulty:"kolay"},{id:6048,topicId:22,passage:"A climate scientist studied average annual temperatures in a northern European city from 1950 to 2020. The data showed that the average temperature was 8.2°C in 1950, 8.5°C in 1970, 9.1°C in 1990, and 10.3°C in 2020.\n\nWhich choice most effectively uses data from the study to support the claim that temperature increases have accelerated in recent decades?",options:["A) The average annual temperature in the city was 10.3°C in 2020, which is warmer than the historical average.","B) Between 1950 and 1970, the average temperature rose by 0.3°C, while between 1990 and 2020, it rose by 1.2°C — four times the earlier rate of increase.","C) The average temperature has increased every decade since 1950.","D) The city's average temperature in 2020 was 10.3°C."],answer:"B",explanation:"İddia: artış HIZLANDI. B, erken dönem artışını (0.3°C/20 yıl) geç dönemle (1.2°C/30 yıl) karşılaştırarak hızlanmayı gösterir.",rule:"Hızlanma iddiası: dönemler arası artış hızı karşılaştırması",difficulty:"zor"},{id:6049,topicId:22,passage:"A health researcher surveyed 1,200 adults about their daily fruit and vegetable intake and their self-reported health status. The results showed:\n- 0-1 servings/day: 38% reported 'good' or 'excellent' health\n- 2-3 servings/day: 56% reported 'good' or 'excellent' health\n- 4-5 servings/day: 71% reported 'good' or 'excellent' health\n- 6+ servings/day: 74% reported 'good' or 'excellent' health\n\nWhich choice most effectively uses data from the survey to support the claim that the health benefits of increased fruit and vegetable consumption diminish beyond a certain threshold?",options:["A) Only 38% of adults who consumed 0-1 servings daily reported good or excellent health, compared to 74% of those who consumed 6 or more servings.","B) While the percentage reporting good or excellent health rose by 15 points between the 2-3 and 4-5 serving groups, it increased by only 3 points between the 4-5 and 6+ serving groups, suggesting diminishing returns.","C) Adults who consumed 6 or more servings daily reported the highest rates of good or excellent health.","D) The survey included 1,200 adult participants."],answer:"B",explanation:"İddia: belirli bir eşiğin ötesinde faydalar azalıyor. B, 4-5 → 6+ arası artışın (3 puan) önceki artıştan (15 puan) çok daha küçük olduğunu gösterir = azalan getiri.",rule:"Azalan getiri: artış oranlarının karşılaştırması",difficulty:"zor"},{id:6050,topicId:22,passage:"A transportation study measured average commute times in a city before and after the opening of a new light rail line. Before the rail line opened, the average commute by car was 42 minutes and by bus was 55 minutes. After the rail line opened, the average car commute decreased to 38 minutes, the bus commute remained at 54 minutes, and the average rail commute was 31 minutes.\n\nWhich finding from the study best supports the claim that the new rail line benefited commuters who continued to drive?",options:["A) The average rail commute was 31 minutes, which was faster than both car and bus commutes.","B) The average car commute decreased from 42 to 38 minutes after the rail line opened, likely because some former drivers switched to rail, reducing road congestion.","C) Bus commute times remained essentially unchanged after the rail line opened.","D) The rail line provided the fastest commute option at 31 minutes."],answer:"B",explanation:"İddia: tren hattı ARABAYLA GİDENLERE de fayda sağladı. B, araba sürüş süresinin 42→38'e düştüğünü gösterir (sürücüler trene geçti → trafik azaldı).",rule:"Dolaylı fayda: arabayla gidenlerin süresi azaldı",difficulty:"orta"},{id:6051,topicId:22,passage:"A study tracked the reading habits and standardized test scores of 500 middle school students over three years. Students who read independently for 30+ minutes daily scored an average of 14 percentile points higher on reading comprehension tests than students who read for fewer than 10 minutes daily. However, the study also found that students who read for 30+ minutes scored only 2 percentile points higher than those who read for 20-29 minutes.\n\nWhich choice most effectively uses data from the study to argue that schools should encourage at least 20 minutes of daily independent reading?",options:["A) Students who read 30+ minutes daily scored 14 percentile points higher than those who read fewer than 10 minutes.","B) The 2-percentile-point difference between the 20-29 minute and 30+ minute groups suggests that most of the benefit of independent reading is achieved at approximately 20 minutes per day, making this a practical and achievable target for schools.","C) The study tracked 500 middle school students over a period of three years.","D) Independent reading is associated with higher standardized test scores."],answer:"B",explanation:"İddia: en az 20 dakika hedefi. B, 20-29 vs 30+ arasındaki farkın küçük olduğunu göstererek 20 dakikanın faydanın büyük kısmını sağladığını kanıtlar.",rule:"Pratik eşik: marjinal farkın küçüklüğü → 20 dk yeterli",difficulty:"zor"},{id:6052,topicId:23,passage:"The following text is from a 2023 article about urban planning.\n\n\"Cities that have invested in comprehensive public transit networks tend to have lower rates of car ownership, reduced traffic congestion, and smaller per-capita carbon footprints than cities of comparable size that rely primarily on private automobiles. However, the construction of effective transit systems requires sustained political commitment and substantial upfront investment, resources that are often difficult to secure in the face of competing budgetary priorities.\"\n\nWhich choice most logically completes the text?",options:["A) For this reason, most cities will eventually abandon their public transit systems.","B) The environmental benefits of public transit are therefore negligible in practice.","C) Consequently, cities seeking to reduce their carbon footprints through transit investment must be prepared to navigate significant political and financial obstacles.","D) As a result, private automobile use will continue to decline in all major cities."],answer:"C",explanation:"Faydalar açık ama politik/mali engeller var → karbon ayak izini azaltmak isteyen şehirler engellere hazır olmalı. C mantıksal sonuç.",rule:"Çıkarım: faydalar + engeller → engellerle yüzleşme gerekliliği",difficulty:"orta"},{id:6053,topicId:23,passage:"The following text discusses a study on bilingualism.\n\n\"A 2021 study examined cognitive function in adults over the age of 65 and found that those who had spoken two or more languages throughout their lives showed a significantly later onset of symptoms associated with cognitive decline than monolingual adults. The researchers controlled for education level, socioeconomic status, and physical health, yet the bilingual advantage persisted across all demographic subgroups.\"\n\nWhich choice most logically completes the text?",options:["A) The study therefore proves that learning a second language will prevent cognitive decline entirely.","B) This suggests that bilingualism itself — independent of other known protective factors — may confer a meaningful cognitive benefit in aging populations.","C) However, the researchers acknowledged that monolingual adults may have other cognitive advantages not measured in this study.","D) The researchers concluded that education level is the strongest predictor of cognitive health in aging adults."],answer:"B",explanation:"Kontrol değişkenleri elendi + çift dilli avantaj devam etti → iki dillilik kendisi bağımsız bir bilişsel fayda sağlayabilir. B.",rule:"Çıkarım: kontroller sonrası devam eden etki → bağımsız fayda",difficulty:"zor"},{id:6054,topicId:23,passage:"The following text is adapted from a literary analysis.\n\n\"In Kafka's The Metamorphosis, Gregor Samsa's transformation into an insect is never explained, and the narrative voice treats it with a matter-of-factness that mirrors the family's own disturbingly rapid adjustment to the situation. Rather than recoiling in sustained horror, the family's primary concern quickly becomes the practical question of how to manage Gregor's condition without disrupting their routines.\"\n\nBased on the text, which choice best states a conclusion about the novella's thematic concerns?",options:["A) The novella is primarily a horror story about physical transformation.","B) Kafka's narrative suggests that the dehumanizing effects of social and familial obligation are more disturbing than the transformation itself.","C) The Metamorphosis is a realistic depiction of family dynamics in early twentieth-century Prague.","D) Kafka intended the transformation to be interpreted literally rather than symbolically."],answer:"B",explanation:"Aile korkuyla tepki vermiyor, pratik kaygılara odaklanıyor → dönüşümün kendisinden daha rahatsız edici olan şey sosyal/ailevi yükümlülüklerin insanlıktan çıkarma etkisi. B.",rule:"Çıkarım: ailenin pratik tepkisi → insanlıktan çıkarma teması",difficulty:"zor"},{id:6055,topicId:23,passage:"The following text is from a 2024 article about artificial intelligence.\n\n\"Large language models have demonstrated impressive performance on tasks ranging from translation to code generation. However, researchers have observed that these models sometimes produce confident, detailed responses that are entirely fabricated — a phenomenon known as 'hallucination.' The frequency of hallucinations appears to correlate with the specificity of the query: models are more likely to generate false information when asked about narrow, technical topics than when responding to broad, well-documented subjects.\"\n\nBased on the text, which choice best states an inference about the practical use of large language models?",options:["A) Large language models should never be used for any task that requires factual accuracy.","B) Large language models are most reliable when used for tasks involving well-established, widely documented information, and should be used with greater caution for specialized or technical queries.","C) The hallucination problem has been effectively solved by recent advances in model training.","D) Large language models are more useful for creative writing than for technical tasks."],answer:"B",explanation:"Halüsinasyon sıklığı sorgunun spesifikliğiyle ilişkili: dar/teknik → daha fazla halüsinasyon. B, pratik çıkarım: genel konularda güvenilir, teknik konularda dikkatli.",rule:"Çıkarım: spesifiklik-halüsinasyon korelasyonu → kullanım rehberliği",difficulty:"orta"},{id:6056,topicId:23,passage:"The following text is from a 2023 study on ocean acidification.\n\n\"As atmospheric CO₂ levels rise, oceans absorb increasing amounts of carbon dioxide, lowering the pH of seawater in a process known as ocean acidification. Laboratory experiments have shown that reduced pH impairs the ability of marine organisms such as oysters and corals to form calcium carbonate shells and skeletons. However, field observations have revealed that some populations of these organisms in naturally acidified waters near volcanic vents show no significant reduction in calcification rates, suggesting\"\n\nWhich choice most logically completes the text?",options:["A) that ocean acidification poses no threat to marine ecosystems.","B) that some populations may possess genetic adaptations that confer resilience to acidified conditions.","C) that laboratory experiments are inherently unreliable indicators of real-world ecological dynamics.","D) that volcanic vents are the primary cause of ocean acidification."],answer:"B",explanation:"Lab'da pH düşüklüğü zararlı → ama doğal ortamda bazı popülasyonlar etkilenmemiş → genetik adaptasyon olabilir. B mantıksal sonuç.",rule:"Çıkarım: lab vs doğa farkı → adaptasyon olasılığı",difficulty:"zor"},{id:6057,topicId:23,passage:"The following text is from a sociology article.\n\n\"Studies of social mobility consistently find that the single strongest predictor of an individual's economic status in adulthood is the economic status of their parents. This relationship holds across countries, time periods, and economic systems, though the degree of intergenerational income persistence varies. The Nordic countries, which invest heavily in universal education and social safety nets, exhibit lower intergenerational persistence than the United States, where access to quality education varies more widely by socioeconomic background.\"\n\nBased on the text, which choice most logically follows?",options:["A) Economic mobility is impossible in the United States.","B) The Nordic countries have eliminated the influence of parental wealth on children's outcomes.","C) Differences in educational access may partially explain why some societies achieve greater economic mobility than others.","D) Universal education programs have no measurable effect on social mobility."],answer:"C",explanation:"Nordik ülkeleri (evrensel eğitim) → düşük nesiller arası süreklilik. ABD (değişken eğitim erişimi) → yüksek süreklilik. Çıkarım: eğitim erişimi farkları → ekonomik hareketlilik farkları. C.",rule:"Çıkarım: Nordik vs ABD eğitim erişimi → hareketlilik farkı",difficulty:"orta"},{id:7001,topicId:17,passage:"The dancer's movements were remarkably ___; every gesture flowed into the next with an effortless grace that concealed the years of rigorous training behind it.",options:["A) labored","B) fluid","C) rigid","D) erratic"],answer:"B",explanation:"Akıcı: 'flowed into the next with effortless grace'. Fluid = akıcı.",rule:"'flowed...effortless grace' → fluid",difficulty:"kolay"},{id:7002,topicId:17,passage:"The senator's speech was deliberately ___: she avoided specifics, relying instead on broad platitudes that could not easily be challenged or fact-checked.",options:["A) incisive","B) provocative","C) vague","D) eloquent"],answer:"C",explanation:"Spesifik detaylardan kaçındı + geniş klişeler. Vague = belirsiz.",rule:"'avoided specifics, broad platitudes' → vague",difficulty:"kolay"},{id:7003,topicId:17,passage:"The new hire's ___ impressed her supervisors; within weeks she had mastered tasks that typically required months of training.",options:["A) complacency","B) aptitude","C) reluctance","D) obstinacy"],answer:"B",explanation:"Haftalarca süresi gereken işleri hızla öğrendi → yetenek. Aptitude = doğal yetenek.",rule:"'mastered tasks that typically required months' → aptitude",difficulty:"orta"},{id:7004,topicId:17,passage:"While the first edition of the textbook was widely criticized for its errors, the revised version is considered ___, having addressed virtually every inaccuracy identified by reviewers.",options:["A) flawed","B) contentious","C) authoritative","D) outdated"],answer:"C",explanation:"Hatalar düzeltildi → artık güvenilir/otoriter. Authoritative = otoriter, güvenilir.",rule:"'addressed virtually every inaccuracy' → authoritative",difficulty:"orta"},{id:7005,topicId:17,passage:"The playwright's dialogue is ___, capturing the rhythms and idioms of everyday speech with an authenticity that makes the characters feel genuinely alive.",options:["A) stilted","B) naturalistic","C) ornate","D) archaic"],answer:"B",explanation:"Günlük konuşma ritimlerini yakalıyor + otantik. Naturalistic = doğalcı.",rule:"'rhythms of everyday speech, authenticity' → naturalistic",difficulty:"orta"},{id:7006,topicId:17,passage:"The discovery was entirely ___: the researchers were investigating an unrelated phenomenon when they stumbled upon a compound with remarkable antibacterial properties.",options:["A) deliberate","B) serendipitous","C) predictable","D) inconclusive"],answer:"B",explanation:"İlgisiz bir araştırma sırasında tesadüfen bulundu. Serendipitous = şanslı tesadüf.",rule:"'investigating unrelated...stumbled upon' → serendipitous",difficulty:"zor"},{id:7007,topicId:17,passage:"Far from being ___ by the criticism, the artist seemed energized by it, producing her most ambitious work in the months that followed.",options:["A) inspired","B) emboldened","C) deterred","D) gratified"],answer:"C",explanation:"'Far from being ___' + eleştiriden enerji aldı → caydırılmadı. Deterred = caydırılmış.",rule:"'Far from being ___' + 'seemed energized' → deterred (zıt)",difficulty:"zor"},{id:7008,topicId:17,passage:"The memoir offers a remarkably ___ portrait of the author's childhood, sparing neither herself nor her family from honest, sometimes unflattering examination.",options:["A) idealized","B) superficial","C) sentimental","D) unflinching"],answer:"D",explanation:"Dürüst, bazen gurur kırıcı inceleme + kimseyi esirgemiyor. Unflinching = gözünü kırpmayan.",rule:"'sparing neither...honest, unflattering' → unflinching",difficulty:"zor"},{id:7009,topicId:17,passage:"The author argues that the Industrial Revolution, far from being a sudden transformation, was a ___ process that unfolded over several generations.",options:["A) rapid","B) cataclysmic","C) gradual","D) spontaneous"],answer:"C",explanation:"Ani dönüşüm DEĞİL + birkaç nesil boyunca gelişti. Gradual = kademeli.",rule:"'far from sudden' + 'several generations' → gradual",difficulty:"kolay"},{id:7010,topicId:17,passage:"The CEO's ___ leadership style, characterized by an unwillingness to delegate authority or tolerate dissent, ultimately alienated even her most loyal supporters.",options:["A) collaborative","B) autocratic","C) adaptive","D) visionary"],answer:"B",explanation:"Yetki devretmeyi reddetme + muhalefete tahammülsüzlük. Autocratic = otokratik.",rule:"'unwillingness to delegate or tolerate dissent' → autocratic",difficulty:"orta"},{id:7011,topicId:17,passage:"The novel's conclusion, in which every narrative thread is neatly resolved, struck many critics as overly ___, lacking the ambiguity that had made the preceding chapters so compelling.",options:["A) complex","B) enigmatic","C) tidy","D) suspenseful"],answer:"C",explanation:"Tüm hikaye ipleri derli toplu çözüldü → aşırı düzenli. Tidy = derli toplu.",rule:"'neatly resolved...lacking ambiguity' → tidy",difficulty:"orta"},{id:7012,topicId:17,passage:"The policy was presented as a bold reform, but critics dismissed it as merely ___, arguing that it preserved the fundamental structures it purported to change.",options:["A) revolutionary","B) cosmetic","C) comprehensive","D) punitive"],answer:"B",explanation:"Temelden değiştirmek yerine yüzeyde kaldı. Cosmetic = kozmetik, yüzeysel.",rule:"'preserved fundamental structures it purported to change' → cosmetic",difficulty:"zor"},{id:7013,topicId:17,passage:"The ambassador's remarks, though couched in the language of diplomacy, carried an unmistakably ___ message: further provocations would not be tolerated.",options:["A) conciliatory","B) ambiguous","C) stern","D) jovial"],answer:"C",explanation:"Diplomatik dil ama açık mesaj: tahrikler tolere EDİLMEYECEK. Stern = sert, ciddi.",rule:"'provocations would not be tolerated' → stern",difficulty:"orta"},{id:7014,topicId:17,passage:"The committee's report was ___, running to over four hundred pages and covering every aspect of the issue in exhaustive detail.",options:["A) concise","B) cursory","C) exhaustive","D) superficial"],answer:"C",explanation:"400+ sayfa + her yönü tükenmez detayda. Exhaustive = kapsamlı, ayrıntılı.",rule:"'four hundred pages, every aspect, exhaustive detail' → exhaustive",difficulty:"kolay"},{id:7015,topicId:17,passage:"Her colleagues found her ___ manner refreshing in an industry known for its guarded, calculating communication; she said exactly what she meant without hedging or evasion.",options:["A) forthright","B) evasive","C) tactful","D) cryptic"],answer:"A",explanation:"Kastettiğini söylüyor + kaçamak yok. Forthright = açık sözlü, doğrudan.",rule:"'said exactly what she meant without hedging' → forthright",difficulty:"orta"},{id:7016,topicId:17,passage:"The technology, once considered ___, has become indispensable; virtually every hospital in the country now relies on it for routine diagnostic procedures.",options:["A) essential","B) peripheral","C) ubiquitous","D) obsolete"],answer:"B",explanation:"'Once considered ___' + ŞİMDİ vazgeçilmez. Eskiden önemsiz/ikincil görülüyordu. Peripheral = çevresel, ikincil.",rule:"Zaman kontrastı: 'once ___' → 'now indispensable' → peripheral",difficulty:"zor"},{id:7017,topicId:17,passage:"The historian's account is notable for its ___ tone; unlike many popular histories, it resists the temptation to pass moral judgment on the figures it describes.",options:["A) polemical","B) dispassionate","C) celebratory","D) indignant"],answer:"B",explanation:"Ahlaki yargı geçirmekten kaçınıyor. Dispassionate = tarafsız, duygusuz.",rule:"'resists moral judgment' → dispassionate",difficulty:"zor"},{id:7018,topicId:17,passage:"The ecosystem proved remarkably ___, recovering its biodiversity within just three years of the devastating wildfire.",options:["A) fragile","B) stagnant","C) resilient","D) vulnerable"],answer:"C",explanation:"Yıkıcı yangın sonrası 3 yılda toparlandı. Resilient = dirençli, toparlanma kapasitesi olan.",rule:"'recovering within three years of devastating wildfire' → resilient",difficulty:"kolay"},{id:7019,topicId:17,passage:"The professor's explanation was anything but ___; students left the lecture more confused than when they had arrived.",options:["A) perplexing","B) illuminating","C) tedious","D) controversial"],answer:"B",explanation:"'Anything but ___' + daha çok kafa karıştırdı → AYDINLATICI DEĞİLDİ. Illuminating = aydınlatıcı.",rule:"'anything but ___' + 'more confused' → illuminating (olumsuzlama)",difficulty:"zor"},{id:7020,topicId:17,passage:"Despite the project's ambitious scope, its execution was remarkably ___; every deadline was met, every budget constraint was honored, and every deliverable exceeded expectations.",options:["A) haphazard","B) methodical","C) chaotic","D) improvised"],answer:"B",explanation:"Her şey zamanında + bütçeye uygun + beklentileri aştı. Methodical = metodik, düzenli.",rule:"'every deadline met, budget honored, exceeded expectations' → methodical",difficulty:"orta"},{id:7021,topicId:18,passage:"The following text is from a 2024 article about the microbiome.\n\n\"For most of the twentieth century, bacteria were understood primarily as agents of disease. Beginning in the 1990s, however, advances in genome sequencing revealed that the human body hosts trillions of bacteria, the vast majority of which are not only harmless but essential to digestion, immune function, and even mental health. This paradigm shift has transformed how researchers approach conditions from obesity to depression.\"\n\nWhich choice best describes the overall structure of the text?",options:["A) It contrasts an older scientific understanding with a newer one and notes the newer view's broader implications.","B) It describes a medical breakthrough and evaluates its limitations.","C) It presents two equally valid theories about bacteria and remains neutral.","D) It chronologically lists discoveries about bacteria."],answer:"A",explanation:"Eski anlayış (hastalık ajanları) → 'however' → yeni anlayış (faydalı) + sonuçları. A.",rule:"Yapı: eski görüş → 'however' → yeni paradigma + sonuçlar",difficulty:"orta"},{id:7022,topicId:18,passage:"The following text is adapted from a political science journal.\n\n\"Proponents of direct democracy argue that referendums empower citizens by giving them a direct voice in policymaking. Critics, however, contend that complex policy questions cannot be adequately addressed through simple yes-or-no votes, and that referendums are susceptible to manipulation by well-funded interest groups. The debate reflects a deeper tension in democratic theory between the ideal of popular sovereignty and the practical need for informed, deliberative decision-making.\"\n\nWhat is the main purpose of the text?",options:["A) To argue that direct democracy is superior to representative democracy.","B) To present opposing views on direct democracy and frame them within a larger theoretical debate.","C) To describe how referendums are conducted in different countries.","D) To criticize the influence of interest groups on democratic processes."],answer:"B",explanation:"Taraftarlar + eleştirmenler + daha derin teorik gerilim. B.",rule:"Amaç: karşıt görüşler + daha geniş çerçeve",difficulty:"zor"},{id:7023,topicId:18,passage:"The following text is from a nature documentary transcript.\n\n\"The mimic octopus of Southeast Asia can impersonate at least fifteen different species, including lionfish, flatfish, and sea snakes. Unlike other octopuses that rely on camouflage to blend into the background, the mimic octopus actively shapes its body to resemble dangerous animals — a strategy that deters predators not by concealment but by intimidation.\"\n\nWhich choice best describes the function of the second sentence?",options:["A) It provides an example that supports the claim in the first sentence.","B) It distinguishes the mimic octopus's strategy from that of other octopuses.","C) It offers a counterargument to the first sentence's claim.","D) It describes the evolutionary origins of the octopus's ability."],answer:"B",explanation:"İkinci cümle: 'Unlike other octopuses' = diğerlerinden AYIRMA. B.",rule:"Fonksiyon: 'Unlike' = diğerlerinden ayırma/karşılaştırma",difficulty:"orta"},{id:7024,topicId:18,passage:"The following text discusses a 2023 study.\n\n\"Researchers at MIT developed an AI system that can predict protein structures with 95% accuracy — a task that previously required months of laboratory work. The team acknowledges, however, that the model performs less reliably when applied to proteins that differ significantly from those in its training data. Despite this limitation, the tool has already accelerated drug discovery timelines in several pharmaceutical companies.\"\n\nWhich choice best describes the overall structure of the text?",options:["A) It describes an achievement, acknowledges its limitations, and notes its practical impact despite those limitations.","B) It presents a finding and argues that it is unreliable.","C) It compares two methods of predicting protein structures.","D) It describes a technology and predicts its future applications."],answer:"A",explanation:"Başarı (%95) → sınırlama ('less reliably') → yine de pratik etki. A.",rule:"Yapı: başarı → sınırlama → yine de etki",difficulty:"orta"},{id:7025,topicId:18,passage:"The following text is from a cultural essay.\n\n\"It is tempting to view the Renaissance as a clean break from the medieval period — a sudden flowering of humanism after centuries of intellectual stagnation. But this narrative oversimplifies a far messier reality. Many of the ideas celebrated as 'Renaissance innovations' were in fact continuations of intellectual traditions that had flourished in medieval Islamic scholarship, Byzantine culture, and monastic learning communities throughout the so-called 'Dark Ages.'\"\n\nWhat is the main purpose of the text?",options:["A) To celebrate the achievements of the Renaissance.","B) To challenge a simplified historical narrative by highlighting overlooked continuities.","C) To argue that Islamic scholarship was superior to European scholarship.","D) To provide a chronological overview of medieval intellectual history."],answer:"B",explanation:"'Tempting to view' (yaygın anlatı) → 'oversimplifies' → gerçekte devamlılıklar vardı. B.",rule:"Amaç: basitleştirilmiş anlatıyı karmaşıklaştır",difficulty:"zor"},{id:7026,topicId:18,passage:"The following text discusses the architecture of Frank Lloyd Wright.\n\n\"Wright's Fallingwater, completed in 1937, is often cited as his masterpiece. But to focus exclusively on Fallingwater is to overlook the radical ambition of his Usonian houses — modest, affordable homes designed to bring modernist principles to the American middle class. While Fallingwater is a monument to genius, the Usonian houses represent something arguably more important: a vision of architecture as a democratic practice.\"\n\nWhat is the main purpose of the text?",options:["A) To describe the technical features of Fallingwater.","B) To argue that Wright's less celebrated Usonian houses deserve greater recognition.","C) To compare the costs of building Fallingwater and the Usonian houses.","D) To provide a biography of Frank Lloyd Wright."],answer:"B",explanation:"'To focus exclusively on Fallingwater is to overlook' + 'arguably more important' → Usonian evleri daha fazla tanınmayı hak ediyor. B.",rule:"Amaç: az tanınan çalışmanın önemini vurgulama",difficulty:"zor"},{id:7027,topicId:19,passage:"Text 1:\n\"Standardized testing provides an objective, comparable measure of student achievement across diverse educational contexts. Without such measures, universities would have no reliable way to evaluate applicants from vastly different schools and curricula.\"\n\nText 2:\n\"Standardized tests systematically disadvantage students from under-resourced schools, who lack access to the test preparation materials and tutoring available to their wealthier peers. The 'objectivity' these tests claim to provide is an illusion that conceals deep structural inequities.\"\n\nBased on the texts, how would the author of Text 2 most likely characterize the claim in Text 1 about objectivity?",options:["A) As accurate but incomplete.","B) As fundamentally misleading because the tests reflect resource disparities rather than true ability.","C) As irrelevant to the question of university admissions.","D) As correct for wealthy students but incorrect for others."],answer:"B",explanation:"Text 2: 'objectivity is an illusion that conceals structural inequities' → temelden yanıltıcı. B.",rule:"Text 2 objektifliği 'illusion' olarak görüyor → fundamentally misleading",difficulty:"zor"},{id:7028,topicId:19,passage:"Text 1:\n\"The growing use of artificial intelligence in criminal sentencing — where algorithms assess the likelihood that a defendant will reoffend — offers the promise of more consistent, less biased decisions than those made by human judges.\"\n\nText 2:\n\"Studies have shown that recidivism prediction algorithms trained on historical crime data reproduce and amplify racial biases present in the criminal justice system. Far from reducing bias, these tools risk giving it a veneer of scientific legitimacy.\"\n\nWhich choice best describes the relationship between the two texts?",options:["A) Text 2 provides evidence that contradicts the premise of Text 1.","B) Text 2 extends the argument made in Text 1 to a new domain.","C) Both texts agree that AI sentencing tools reduce bias.","D) Text 2 examines a different application of AI than Text 1."],answer:"A",explanation:"Text 1: AI → daha az önyargı. Text 2: AI aslında önyargıyı yeniden üretir → Text 1'in öncülünü çürütür. A.",rule:"Karşıt kanıt: Text 2 Text 1'in 'less biased' öncülüne itiraz ediyor",difficulty:"orta"},{id:7029,topicId:19,passage:"Text 1:\n\"The gig economy has expanded economic opportunity by allowing individuals to monetize underutilized assets and skills on their own schedule, creating a new class of flexible micro-entrepreneurs.\"\n\nText 2:\n\"Workers in the gig economy lack the protections — health insurance, paid leave, retirement benefits — that full-time employees take for granted. The flexibility that platforms tout as empowerment often masks economic precarity and unpredictable income.\"\n\nBased on the texts, both authors would most likely agree with which statement?",options:["A) The gig economy has fundamentally changed the nature of work.","B) The gig economy provides workers with adequate protections.","C) Platform companies are primarily motivated by altruism.","D) Traditional employment is inferior to gig work."],answer:"A",explanation:"Her ikisi de gig ekonomisinin işin doğasını değiştirdiğini kabul ediyor — biri olumlu, biri olumsuz. A = ortak zemin.",rule:"Ortak zemin: her ikisi de değişimi kabul ediyor",difficulty:"orta"},{id:7030,topicId:19,passage:"Text 1:\n\"Nuclear energy produces virtually no greenhouse gas emissions during operation and can generate enormous amounts of electricity from a small physical footprint, making it an essential component of any serious decarbonization strategy.\"\n\nText 2:\n\"While nuclear energy is low-carbon, the catastrophic risks associated with reactor accidents and the unresolved problem of long-term radioactive waste storage mean that investment in nuclear power diverts resources from inherently safer renewable alternatives like solar and wind.\"\n\nHow does Text 2 relate to Text 1?",options:["A) It accepts Text 1's premise about emissions but argues that other factors outweigh this advantage.","B) It disputes Text 1's claim that nuclear energy is low-carbon.","C) It provides additional arguments in support of nuclear energy.","D) It discusses a completely different energy source than Text 1."],answer:"A",explanation:"Text 2: 'while low-carbon' (kabul) + 'catastrophic risks + waste + diverts resources' (diğer faktörler ağır basıyor). A.",rule:"Kısmi kabul + ağır basan dezavantajlar",difficulty:"zor"},{id:7031,topicId:20,passage:"The following text is from a 2024 technology article.\n\n\"The 'right to repair' movement has gained significant momentum in recent years, with legislation in several states now requiring manufacturers to provide consumers with the tools, parts, and documentation needed to repair their own electronic devices. Advocates argue that repair restrictions not only burden consumers financially but also contribute to electronic waste, as devices that could be repaired are instead discarded. Opponents, primarily manufacturers, contend that opening devices to third-party repair poses safety and intellectual property concerns.\"\n\nWhich choice best states the main idea of the text?",options:["A) Manufacturers oppose the right-to-repair movement because it threatens their profits.","B) The right-to-repair movement is growing but faces opposition from manufacturers who cite safety and intellectual property concerns.","C) Electronic waste is the most pressing environmental problem in the United States.","D) Several states have passed right-to-repair legislation."],answer:"B",explanation:"Tüm metni kapsayan: hareket büyüyor + muhalefet var. B. A çok dar, C aşırı geniş, D sadece bir detay.",rule:"Ana fikir: büyüyen hareket + muhalefet",difficulty:"orta"},{id:7032,topicId:20,passage:"The following text is from a psychology article.\n\n\"Nostalgia, long dismissed by psychologists as a form of sentimental self-indulgence, has been rehabilitated by recent research. Studies conducted at the University of Southampton have shown that nostalgic reflection can increase feelings of social connectedness, boost self-esteem, and even reduce the perception of physical pain. Rather than a retreat from the present, nostalgia appears to function as a psychological resource that helps individuals cope with uncertainty and loneliness.\"\n\nWhich choice best states the main idea of the text?",options:["A) Nostalgia is harmful to mental health and should be avoided.","B) The University of Southampton has conducted important psychological research.","C) Recent research has revealed that nostalgia, once dismissed as negative, serves beneficial psychological functions.","D) Nostalgia reduces the perception of physical pain."],answer:"C",explanation:"Eski görüş (olumsuz) → yeni araştırma (faydalı). C tüm metni kapsar.",rule:"Ana fikir: olumsuz → olumlu yeniden değerlendirme",difficulty:"orta"},{id:7033,topicId:20,passage:"The following text discusses the history of color in art.\n\n\"Before the mid-nineteenth century, the cost of pigments severely constrained artists' palettes. Ultramarine blue, derived from lapis lazuli imported from Afghanistan, was literally worth more than gold, and its use was typically reserved for the most important figures in a painting — often the Virgin Mary. The development of synthetic pigments in the 1800s democratized color, making vibrant hues affordable and abundant for the first time, and fundamentally transforming the visual possibilities available to artists.\"\n\nWhich choice best states the main idea of the text?",options:["A) Ultramarine blue was historically the most expensive pigment.","B) Synthetic pigments were developed in the 1800s.","C) The development of affordable synthetic pigments transformed artistic possibilities by removing the economic constraints that had historically limited artists' use of color.","D) The Virgin Mary was traditionally painted in blue."],answer:"C",explanation:"Boya maliyeti kısıtlama yarattı → sentetik boyalar → renk demokratikleşti. C tüm süreci kapsar.",rule:"Ana fikir: ekonomik kısıtlama → sentetik çözüm → dönüşüm",difficulty:"orta"},{id:7034,topicId:20,passage:"The following text is from a biology article.\n\n\"The axolotl, a salamander native to the lakes of central Mexico, possesses an extraordinary regenerative ability: it can regrow entire limbs, portions of its heart, and even parts of its brain without scarring. Scientists are studying the molecular mechanisms behind this ability in the hope that understanding axolotl regeneration could eventually lead to breakthroughs in human medicine, particularly in the treatment of spinal cord injuries and organ damage.\"\n\nAccording to the text, why are scientists interested in studying the axolotl?",options:["A) Because the axolotl is an endangered species that needs to be protected.","B) Because understanding its regenerative abilities could lead to advances in treating human injuries and organ damage.","C) Because the axolotl is the only animal capable of regeneration.","D) Because the axolotl's habitat in Mexico is being destroyed."],answer:"B",explanation:"'in the hope that understanding axolotl regeneration could lead to breakthroughs in human medicine' → B.",rule:"Detay: rejenerasyon anlayışı → insan tıbbı",difficulty:"kolay"},{id:7035,topicId:20,passage:"The following text discusses economic theory.\n\n\"Traditional economic models assumed that individuals make decisions by rationally weighing all available information to maximize their self-interest. Behavioral economists such as Daniel Kahneman and Amos Tversky demonstrated, however, that human decision-making is systematically influenced by cognitive biases — mental shortcuts that often lead to predictably irrational choices. Their work did not invalidate traditional economics so much as reveal its blind spots, showing that a more complete model of economic behavior must account for the psychological realities of how people actually think.\"\n\nWhich choice best states the main idea of the text?",options:["A) Traditional economic models are entirely incorrect and should be discarded.","B) Daniel Kahneman won the Nobel Prize for his work in behavioral economics.","C) Behavioral economics revealed that traditional models, while useful, are incomplete because they fail to account for systematic cognitive biases in human decision-making.","D) Cognitive biases cause people to make irrational financial decisions."],answer:"C",explanation:"'did not invalidate...so much as reveal blind spots' → geleneksel modeller faydalı ama eksik. C.",rule:"Ana fikir: geleneksel modeller faydalı ama eksik — bilişsel önyargılar",difficulty:"zor"},{id:7036,topicId:21,passage:"A marine biologist claims that coral reef ecosystems are more resilient to climate change than previously thought.\n\nWhich finding, if true, would most directly support this claim?",options:["A) Coral bleaching events have increased in frequency over the past two decades.","B) A study found that several coral species in the Pacific have developed heat-resistant genetic variants that allow them to survive in waters 2°C warmer than their ancestors could tolerate.","C) Coral reefs are important habitats for commercial fish species.","D) Global ocean temperatures have risen by an average of 0.8°C since 1900."],answer:"B",explanation:"İddia
